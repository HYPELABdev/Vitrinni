<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando Vitrinni...</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --main: #00ff88; --bg: #0b1020; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: white; overflow-x: hidden; min-height: 100vh; }

        /* Background Animado Premium */
        .bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at top left, rgba(0, 255, 136, 0.15), transparent 40%), radial-gradient(circle at bottom right, rgba(0, 191, 255, 0.1), transparent 40%), #0b1020; }
        
        header { text-align: center; padding: 60px 20px 40px; animation: fadeInDown 0.8s ease; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .logo { font-size: clamp(40px, 8vw, 72px); font-weight: 800; letter-spacing: -2px; line-height: 1; }
        .logo .highlight { color: var(--main); text-shadow: 0 0 30px var(--main); }
        
        .hero { margin-top: 20px; font-size: clamp(20px, 5vw, 32px); font-weight: 700; background: linear-gradient(to right, #fff, #9ca6ba); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { margin-top: 10px; color: #9ca6ba; font-size: 15px; max-width: 500px; margin-inline: auto; }

        .stats { display: flex; justify-content: center; gap: 15px; margin-top: 30px; flex-wrap: wrap; }
        .stat { padding: 10px 20px; border-radius: 100px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); font-size: 13px; font-weight: 600; backdrop-filter: blur(10px); }
        .stat span { color: var(--main); }

        .container { max-width: 800px; margin: auto; padding: 20px 20px 100px; }

        .alert { padding: 16px; border-radius: 20px; margin-bottom: 30px; background: rgba(0, 255, 136, 0.1); border: 1px solid var(--main); color: var(--main); text-align: center; font-weight: 700; font-size: 14px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        .cards { display: grid; gap: 20px; }
        .card { position: relative; padding: 30px; border-radius: 28px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent); transform: translateX(-100%); transition: 0.5s; }
        .card:hover::before { transform: translateX(100%); }
        .card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); }
        .card.active { border-color: var(--main); background: rgba(0, 255, 136, 0.05); box-shadow: 0 10px 40px rgba(0, 255, 136, 0.1); }

        .card h3 { font-size: 18px; font-weight: 700; opacity: 0.9; }
        .badge { padding: 5px 12px; border-radius: 10px; background: var(--main); color: #000; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .price { margin-top: 15px; font-size: 48px; font-weight: 800; color: #fff; display: flex; align-items: baseline; gap: 5px; }
        .price::before { content: 'R$'; font-size: 18px; color: var(--main); }
        .desc { margin-top: 10px; color: #9ca6ba; font-size: 14px; line-height: 1.6; }

        .form { margin-top: 40px; padding: 30px; border-radius: 30px; background: #fff; color: #000; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .form-title { font-size: 20px; font-weight: 800; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 18px; border: 2px solid #eee; outline: none; border-radius: 20px; background: #f8f9fa; color: #000; font-size: 16px; transition: 0.3s; font-weight: 600; }
        input:focus { border-color: var(--main); background: #fff; }
        
        button { width: 100%; padding: 20px; margin-top: 15px; border: none; border-radius: 20px; background: #000; color: #fff; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        button:hover { background: var(--main); color: #000; transform: scale(1.02); }

        /* Placeholder Loading */
        .loading { display: flex; justify-content: center; align-items: center; height: 100vh; font-weight: 800; color: var(--main); letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="loader" class="loading">LEVEL UP...</div>
    <div id="content" style="display: none;">
        <div class="bg"></div>
        <header>
            <div class="logo">
                <span id="brand1"></span><span class="highlight" id="brand2"></span>
            </div>
            <div class="hero" id="hero"></div>
            <div class="sub" id="subtitle"></div>
            <div class="stats">
                <div class="stat">🔥 <span id="sales"></span> ativações hoje</div>
                <div class="stat">🔴 <span id="online"></span> online agora</div>
            </div>
        </header>

        <div class="container">
            <div class="alert" id="promo"></div>
            <div class="cards" id="plans"></div>
            <div class="form">
                <div class="form-title">⚡ Entrega Imediata</div>
                <input type="text" id="instagram" placeholder="Qual o seu @ do Instagram?">
                <button onclick="finishOrder()" id="cta">🚀 Finalizar pedido</button>
            </div>
        </div>
    </div>

    <script>
        let CONFIG = {};
        let selectedPlan = null;

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const clienteId = urlParams.get('id');
            
            // Lógica Inteligente: Se tiver ID na URL, busca em /Clientes/. Se não, busca na pasta atual.
            const configPath = clienteId ? `../Clientes/${clienteId}/config.json` : './config.json';

            try {
                const response = await fetch(configPath);
                if (!response.ok) throw new Error();
                CONFIG = await response.json();
                renderSite();
            } catch (e) {
                document.body.innerHTML = "<div class='loading'>ERRO AO CARREGAR CONFIG</div>";
            }
        }

        function renderSite() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            
            document.documentElement.style.setProperty('--main', CONFIG.color || '#00ff88');
            document.getElementById('brand1').innerText = CONFIG.brand;
            document.getElementById('brand2').innerText = CONFIG.brandHighlight;
            document.getElementById('hero').innerText = CONFIG.hero;
            document.getElementById('subtitle').innerText = CONFIG.subtitle;
            document.getElementById('promo').innerText = CONFIG.promo;
            document.getElementById('sales').innerText = CONFIG.stats.sales;
            document.getElementById('online').innerText = CONFIG.stats.online;

            const plansDiv = document.getElementById('plans');
            plansDiv.innerHTML = CONFIG.plans.map((plan, i) => `
                <div class="card ${i === 0 ? 'active' : ''}" onclick="selectPlan(this, ${i})">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <h3>${plan.name}</h3>
                        <span class="badge">${plan.badge}</span>
                    </div>
                    <div class="price">${plan.price.replace('R$', '')}</div>
                    <div class="desc">${plan.description}</div>
                </div>
            `).join('');

            selectPlan(document.querySelector('.card'), 0);
        }

        function selectPlan(card, index) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            selectedPlan = CONFIG.plans[index];
            document.getElementById('cta').innerText = `🚀 RECEBER ${selectedPlan.name.toUpperCase()}`;
        }

        function finishOrder() {
            let insta = document.getElementById('instagram').value.trim();
            if (!insta) return alert('Por favor, informe seu Instagram');
            insta = insta.startsWith('@') ? insta : '@' + insta;

            const msg = `🚀 *NOVO PEDIDO*\n\n📦 *Plano:* ${selectedPlan.name}\n💰 *Valor:* ${selectedPlan.price}\n📸 *Instagram:* ${insta}`;
            window.open(`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        init();
    </script>
</body>
</html>
