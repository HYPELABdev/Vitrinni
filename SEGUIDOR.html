<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Carregando...</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --main: #00ff88; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0b1020; color: white; overflow-x: hidden; }

        /* Background Animado */
        .bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at top left, var(--main), transparent 20%), linear-gradient(-45deg, #0b1020, #11182b, #0f1726); opacity: 0.5; }

        header { text-align: center; padding: 60px 20px 30px; }
        .logo { font-size: 72px; font-weight: 800; letter-spacing: 4px; line-height: 1; }
        .logo .main { color: white; }
        .logo .highlight { color: var(--main); text-shadow: 0 0 25px var(--main); }
        .hero { margin-top: 15px; font-size: 30px; font-weight: 700; }
        .sub { margin-top: 10px; color: #9ca6ba; font-size: 14px; max-width: 600px; margin-inline: auto; }

        /* Stats */
        .stats { display: flex; justify-content: center; gap: 12px; margin-top: 30px; flex-wrap: wrap; }
        .stat { padding: 12px 18px; border-radius: 100px; background: rgba(255, 255, 255, .04); border: 1px solid rgba(255, 255, 255, .08); font-size: 13px; font-weight: 600; }
        .stat span { color: var(--main); }

        .container { max-width: 800px; margin: auto; padding: 20px 20px 100px; }

        /* Banner de Promoção */
        .alert { padding: 16px; border-radius: 20px; margin-bottom: 25px; background: rgba(0, 255, 136, 0.1); border: 1px solid var(--main); color: var(--main); text-align: center; font-weight: 700; font-size: 14px; }

        /* Grid de Planos */
        .cards { display: grid; gap: 18px; }
        .card { padding: 25px; border-radius: 26px; background: rgba(255, 255, 255, .03); border: 1px solid rgba(255, 255, 255, .06); transition: .3s; cursor: pointer; }
        .card:hover { transform: translateY(-5px); border-color: rgba(255, 255, 255, 0.2); }
        .card.active { border-color: var(--main); background: rgba(0, 255, 136, 0.05); box-shadow: 0 0 30px rgba(0, 255, 136, 0.15); }

        .top-card { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .badge { padding: 5px 12px; border-radius: 10px; background: rgba(255, 255, 255, 0.1); font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .price { font-size: 44px; font-weight: 800; color: var(--main); margin: 5px 0; }
        .desc { color: #aab4c7; font-size: 14px; line-height: 1.6; }

        /* Formulário de Envio */
        .form { margin-top: 40px; padding: 30px; border-radius: 28px; background: rgba(255, 255, 255, .04); border: 1px solid rgba(255, 255, 255, .06); }
        .form-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; }
        input { width: 100%; padding: 18px; border: none; outline: none; border-radius: 18px; background: rgba(255, 255, 255, .06); color: white; font-size: 16px; margin-bottom: 15px; border: 1px solid transparent; transition: .3s; }
        input:focus { border-color: var(--main); }
        
        button { width: 100%; padding: 20px; border: none; border-radius: 20px; background: var(--main); color: #000; font-size: 16px; font-weight: 800; cursor: pointer; transition: .3s; }
        button:hover { transform: scale(1.02); filter: brightness(1.1); }

        @media(max-width: 700px) {
            .logo { font-size: 50px; }
            .hero { font-size: 24px; }
            .price { font-size: 38px; }
        }
    </style>
</head>
<body>

<div class="bg"></div>

<header>
    <div class="logo">
        <span class="main" id="brand1"></span><span class="highlight" id="brand2"></span>
    </div>
    <div class="hero" id="hero"></div>
    <div class="sub" id="subtitle"></div>
    <div class="stats">
        <div class="stat">🔥 <span id="sales"></span> ativações hoje</div>
        <div class="stat">🔴 <span id="online"></span> online agora</div>
    </div>
</header>

<div class="container">
    <div class="alert" id="promo"></div>
    <div class="cards" id="plans"></div>

    <div class="form">
        <div class="form-title text-center">Entrega imediata para:</div>
        <input type="text" id="instagram" placeholder="Qual o @ do Instagram?">
        <button onclick="finishOrder()" id="cta">🚀 FINALIZAR PEDIDO</button>
    </div>
</div>

<script>
    let CONFIG = {};
    let selectedPlan = null;

    // Carrega o arquivo fixo que você definiu
    fetch('./config_Seguidor.json')
    .then(res => {
        if(!res.ok) throw new Error('config_Seguidor.json não encontrado');
        return res.json();
    })
    .then(data => {
        CONFIG = data;
        renderSite();
    })
    .catch(err => {
        document.body.innerHTML = `<div style="padding:50px; text-align:center;"><h2>❌ Erro: ${err.message}</h2></div>`;
    });

    function renderSite() {
        document.title = `${CONFIG.brand} ${CONFIG.brandHighlight}`;
        document.documentElement.style.setProperty('--main', CONFIG.color);
        
        document.getElementById('brand1').innerText = CONFIG.brand;
        document.getElementById('brand2').innerText = CONFIG.brandHighlight;
        document.getElementById('hero').innerText = CONFIG.hero;
        document.getElementById('subtitle').innerText = CONFIG.subtitle;
        document.getElementById('promo').innerText = CONFIG.promo;
        document.getElementById('sales').innerText = CONFIG.stats.sales;
        document.getElementById('online').innerText = CONFIG.stats.online;

        const plansDiv = document.getElementById('plans');
        plansDiv.innerHTML = CONFIG.plans.map((plan, i) => `
            <div class="card ${i === 0 ? 'active' : ''}" onclick="selectPlan(this, ${i})">
                <div class="top-card">
                    <h3>${plan.name}</h3>
                    <div class="badge">${plan.badge}</div>
                </div>
                <div class="price">${plan.price}</div>
                <div class="desc">${plan.description}</div>
            </div>
        `).join('');

        selectPlan(document.querySelector('.card'), 0);
    }

    function selectPlan(card, index) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        selectedPlan = CONFIG.plans[index];
        document.getElementById('cta').innerText = `🚀 RECEBER ${selectedPlan.name.toUpperCase()}`;
    }

    function finishOrder() {
        let insta = document.getElementById('instagram').value.trim();
        if(!insta) return alert('Por favor, informe seu Instagram');
        insta = insta.startsWith('@') ? insta : '@' + insta;

        const msg = `🚀 NOVO PEDIDO\n\n📦 Pacote: ${selectedPlan.name}\n💰 Valor: ${selectedPlan.price}\n📸 Instagram: ${insta}`;
        window.open(`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>

</body>
</html>
