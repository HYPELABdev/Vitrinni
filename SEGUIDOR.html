<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEL UP | PAINEL SMM</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --main: #8b5cf6; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:Poppins,sans-serif; }
        body { background:#0b1020; color:white; overflow-x:hidden; }

        .bg { position:fixed; inset:0; z-index:-1; background: radial-gradient(circle at top left,rgba(139, 92, 246, 0.15),transparent 30%), linear-gradient(-45deg,#0b1020,#11182b,#0f1726); background-size:300% 300%; animation:bg 10s ease infinite; }
        @keyframes bg { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        header { text-align:center; padding:50px 20px 30px; }
        .logo { font-size:72px; font-weight:800; letter-spacing:4px; }
        .logo .highlight { color:var(--main); text-shadow:0 0 20px var(--main); }
        .hero { margin-top:14px; font-size:30px; font-weight:700; }

        /* SISTEMA DE PESSOAS ATIVAS */
        .live-stats { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .live-item { background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 50px; font-size: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .dot { height: 8px; width: 8px; background-color: #00ff88; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* NOTIFICAÇÃO FALSA */
        #notification-toast {
            position: fixed; bottom: 20px; left: 20px; background: rgba(15, 23, 42, 0.95);
            border: 1px solid var(--main); padding: 15px; border-radius: 15px;
            display: flex; align-items: center; gap: 12px; z-index: 9999;
            transform: translateX(-150%); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #notification-toast.show { transform: translateX(0); }
        .toast-img { width: 40px; height: 40px; background: var(--main); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .toast-content b { color: var(--main); display: block; font-size: 13px; }
        .toast-content span { font-size: 12px; color: #cbd5e1; }

        /* TABS E CARDS */
        .tabs { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .tab-btn { padding: 12px 25px; border-radius: 100px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: var(--main); border-color: var(--main); box-shadow: 0 0 15px var(--main); }

        .container { max-width:900px; margin:auto; padding:20px; padding-bottom:120px; }
        .cards { display:grid; gap:18px; }
        .card { padding:24px; border-radius:26px; background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03)); border: 1px solid rgba(255,255,255,.06); transition:.25s; cursor:pointer; }
        .card.active { border-color:var(--main); box-shadow:0 0 30px rgba(139, 92, 246, 0.2); transform:scale(1.02); }
        .price { margin-top:14px; font-size:42px; font-weight:800; color:var(--main); }

        .form { margin-top:24px; padding:24px; border-radius:24px; background:rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,.06); }
        input { width:100%; padding:15px; border:none; border-radius:16px; background:rgba(255,255,255,.05); color:white; margin-top:14px; outline: none; }
        button#cta { width:100%; padding:16px; margin-top:16px; border:none; border-radius:18px; background: linear-gradient(45deg, var(--main), #a78bfa); color:white; font-size:15px; font-weight:700; cursor:pointer; transition:.25s; }

        @media(max-width:700px){ .logo{font-size:52px;} #notification-toast { width: calc(100% - 40px); } }
    </style>
</head>

<body>
    <div class="bg"></div>

    <!-- NOTIFICAÇÃO TOAST -->
    <div id="notification-toast">
        <div class="toast-img">🚀</div>
        <div class="toast-content">
            <b id="toast-user">Carregando...</b>
            <span id="toast-msg">Acabou de comprar um pacote!</span>
        </div>
    </div>

    <header>
        <div class="logo"><span id="brand1"></span><span class="highlight" id="brand2"></span></div>
        <div class="hero" id="hero"></div>
        
        <!-- STATUS ATIVOS -->
        <div class="live-stats">
            <div class="live-item"><span class="dot"></span> <span id="count-online">142</span> online</div>
            <div class="live-item">🔥 <span id="count-orders">1,240</span> pedidos hoje</div>
        </div>
    </header>

    <div class="container">
        <div class="tabs" id="category-tabs"></div>
        <div class="cards" id="plans-list"></div>

        <div class="form">
            <div class="form-title">Finalize seu pedido</div>
            <input type="text" id="instagram" placeholder="Digite seu @ do Instagram">
            <button onclick="finishOrder()" id="cta">🚀 Selecione um pacote</button>
        </div>
    </div>

    <script>
        let CONFIG = {};
        let selectedPlan = null;
        let currentCategoryIndex = 0;

        fetch('./config_Seguidor.json')
            .then(res => res.json())
            .then(data => {
                CONFIG = data;
                document.documentElement.style.setProperty('--main', CONFIG.color);
                document.getElementById('brand1').innerText = CONFIG.brand;
                document.getElementById('brand2').innerText = CONFIG.brandHighlight;
                document.getElementById('hero').innerText = CONFIG.hero;
                
                renderTabs();
                renderCategory(0);
                startFakeSocialProof(); // Inicia os sistemas de pessoas ativas
            });

        // --- SISTEMA DE PROVA SOCIAL ---
        function startFakeSocialProof() {
            // Atualiza contadores falsos
            setInterval(() => {
                const online = Math.floor(Math.random() * (180 - 120 + 1)) + 120;
                document.getElementById('count-online').innerText = online;
            }, 5000);

            // Sistema de Notificações
            const names = ["Marcos", "Ana", "Felipe", "Julia", "Lucas", "Carla", "Beatriz", "Ricardo", "Amanda", "Gustavo"];
            const cities = ["São Paulo", "Rio de Janeiro", "Curitiba", "Belo Horizonte", "Salvador", "Fortaleza"];
            const actions = ["1.000 Seguidores", "500 Curtidas", "10.000 Visualizações", "5.000 Seguidores"];

            function showToast() {
                const name = names[Math.floor(Math.random() * names.length)];
                const city = cities[Math.floor(Math.random() * cities.length)];
                const action = actions[Math.floor(Math.random() * actions.length)];
                
                document.getElementById('toast-user').innerText = `${name} (${city})`;
                document.getElementById('toast-msg').innerText = `Acabou de comprar ${action}!`;
                
                const toast = document.getElementById('notification-toast');
                toast.classList.add('show');
                
                setTimeout(() => { toast.classList.remove('show'); }, 5000);
            }

            // Mostra a primeira notificação após 3 segundos, depois a cada 15-25 segundos
            setTimeout(showToast, 3000);
            setInterval(showToast, Math.random() * (25000 - 15000) + 15000);
        }

        // --- LÓGICA DO SITE ---
        function renderTabs() {
            const tabsContainer = document.getElementById('category-tabs');
            tabsContainer.innerHTML = CONFIG.categories.map((cat, index) => `
                <button class="tab-btn ${index === 0 ? 'active' : ''}" onclick="changeCategory(this, ${index})">
                    ${cat.icon} ${cat.name}
                </button>
            `).join('');
        }

        function changeCategory(btn, index) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCategory(index);
        }

        function renderCategory(index) {
            currentCategoryIndex = index;
            const list = document.getElementById('plans-list');
            list.innerHTML = CONFIG.categories[index].plans.map((plan, pIndex) => `
                <div class="card" onclick="selectPlan(this, ${pIndex})">
                    <div class="top">
                        <h3>${plan.name}</h3>
                        <div class="badge">${plan.badge}</div>
                    </div>
                    <div class="price">${plan.price}</div>
                    <div class="desc">✨ ${plan.quality} | 🚀 Entrega: ${plan.delivery}</div>
                </div>
            `).join('');
            const first = list.querySelector('.card');
            if(first) first.click();
        }

        function selectPlan(element, index) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            selectedPlan = CONFIG.categories[currentCategoryIndex].plans[index];
            document.getElementById('cta').innerText = `🚀 Comprar ${selectedPlan.name}`;
        }

        function finishOrder() {
            let insta = document.getElementById('instagram').value.trim();
            if(!selectedPlan || !insta) return alert("Preencha os dados!");
            const msg = `🚀 NOVO PEDIDO\n\n📦 Pacote: ${selectedPlan.name}\n💰 Valor: ${selectedPlan.price}\n📸 Instagram: ${insta.startsWith('@') ? insta : '@'+insta}`;
            window.open(`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
