<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEL UP | Premium Engagement</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --main: #00ff00; --bg-dark: #05070a; }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-dark); color:white; overflow-x:hidden; min-height: 100vh; }

        /* --- EFEITO DE PARTÍCULAS --- */
        .particles {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            color: var(--main);
            opacity: 0.2;
            filter: blur(1px);
            animation: float 15s linear infinite;
            font-size: 20px;
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* --- GLASSMORPHISM & UI --- */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
        }

        header { text-align:center; padding:60px 20px 40px; }
        .logo { font-size:54px; font-weight:900; letter-spacing:-1px; text-transform: uppercase; line-height: 1; }
        .logo .highlight { 
            color: var(--main); 
            text-shadow: 0 0 30px rgba(0, 255, 0, 0.5); 
        }

        .tab-btn { 
            padding: 10px 18px; 
            border-radius: 12px; 
            background: rgba(255,255,255,0.05); 
            cursor: pointer; 
            transition: 0.4s; 
            font-size: 11px; 
            font-weight: 700; 
            white-space: nowrap;
            border: 1px solid transparent;
        }
        .tab-btn.active { 
            background: var(--main); 
            color: black; 
            box-shadow: 0 0 20px rgba(0,255,0,0.3);
        }

        .card { 
            padding:20px; 
            border-radius:22px; 
            background: rgba(255,255,255,0.02); 
            border:1px solid rgba(255,255,255,.05); 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card.active { 
            border-color: var(--main); 
            background: rgba(0,255,0,0.03);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .price { font-size:32px; font-weight:800; color:var(--main); }

        input { 
            width:100%; padding:18px; border-radius:18px; 
            background: rgba(0,0,0,0.3); color:white; 
            border:1px solid rgba(255,255,255,0.1); outline:none; 
            transition: 0.3s;
        }
        input:focus { border-color: var(--main); box-shadow: 0 0 15px rgba(0,255,0,0.1); }

        #cta { 
            width:100%; padding:20px; margin-top:16px; border-radius:18px; 
            background: var(--main); color:black; 
            font-weight:900; font-size: 16px; text-transform: uppercase;
            transition: 0.3s; cursor: pointer;
        }
        #cta:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* Esconder scrollbar */
        #tab-list::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="particles" id="particle-container"></div>

<header>
    <div class="logo"><span id="b1">LEVEL</span><span class="highlight" id="b2">UP</span></div>
    <div class="hero text-gray-400 font-medium mt-3 tracking-wide" id="hero-text">Carregando...</div>
    <div class="flex justify-center gap-6 mt-6">
        <div class="text-center">
            <div class="text-white font-bold text-lg" id="s-vendas">0</div>
            <div class="text-[10px] text-gray-500 uppercase tracking-widest">Vendas</div>
        </div>
        <div class="h-10 w-[1px] bg-white/10"></div>
        <div class="text-center">
            <div class="text-white font-bold text-lg" id="s-online">0</div>
            <div class="text-[10px] text-gray-500 uppercase tracking-widest">Online</div>
        </div>
    </div>
</header>

<div class="container max-w-[500px] mx-auto p-6 pb-20">
    <div class="flex gap-3 mb-8 overflow-x-auto" id="tab-list"></div>

    <div class="grid gap-4" id="plans-grid"></div>

    <div class="form glass p-6 mt-8">
        <label class="text-[11px] uppercase font-bold text-gray-400 ml-1">Seu usuário do Instagram</label>
        <input type="text" id="user-target" placeholder="@seu-perfil">
        <button onclick="sendOrder()" id="cta">Escolha um plano</button>
    </div>
</div>

<script>
    const URL_PINTURA = "https://hypelabdev.github.io/Vitrinni/Clientes/levelup.json";
    let DATA = {};
    let selectedPlan = null;

    // Gerador de Partículas (Likes e Seguidores)
    function createParticles() {
        const container = document.getElementById('particle-container');
        const icons = ['❤️', '👤', '✨', '🔥'];
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = icons[Math.floor(Math.random() * icons.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDelay = Math.random() * 15 + 's';
            p.style.fontSize = (Math.random() * 20 + 10) + 'px';
            container.appendChild(p);
        }
    }

    async function fetchData() {
        try {
            const res = await fetch(`${URL_PINTURA}?t=${new Date().getTime()}`);
            DATA = await res.json();
            
            document.getElementById('b1').innerText = DATA.brand;
            document.getElementById('b2').innerText = DATA.brandHighlight;
            document.getElementById('hero-text').innerText = DATA.hero;
            document.getElementById('s-vendas').innerText = DATA.stats.sales;
            document.getElementById('s-online').innerText = DATA.stats.online;
            document.documentElement.style.setProperty('--main', DATA.color);

            renderTabs();
            createParticles();
        } catch (e) {
            document.getElementById('hero-text').innerText = "ERRO AO CARREGAR";
        }
    }

    function renderTabs() {
        const tabList = document.getElementById('tab-list');
        tabList.innerHTML = '';
        DATA.categories.forEach((cat, index) => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
            btn.innerHTML = `${cat.icon} ${cat.name}`;
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderPlans(cat);
            };
            tabList.appendChild(btn);
        });
        renderPlans(DATA.categories[0]);
    }

    function renderPlans(category) {
        const grid = document.getElementById('plans-grid');
        grid.innerHTML = '';
        category.plans.forEach((plan, index) => {
            const card = document.createElement('div');
            card.className = `card ${index === 0 ? 'active' : ''}`;
            if(index === 0) selectedPlan = plan;

            card.onclick = () => {
                document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                selectedPlan = plan;
                updateButton();
            };

            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="font-bold text-white text-base">${plan.name}</h3>
                        <div class="price">${plan.price}</div>
                    </div>
                    ${plan.badge ? `<span class="text-[10px] bg-green-500/20 text-green-400 px-3 py-1 rounded-full font-black border border-green-500/30">${plan.badge}</span>` : ''}
                </div>
                <div class="flex items-center gap-2 mt-3 opacity-60 text-[11px]">
                    <span>✔ ${plan.quality || 'Qualidade Alta'}</span>
                    <span class="w-1 h-1 bg-white/30 rounded-full"></span>
                    <span>⚡ Entrega Rápida</span>
                </div>
            `;
            grid.appendChild(card);
        });
        updateButton();
    }

    function updateButton() {
        if(selectedPlan) {
            document.getElementById('cta').innerText = `Garantir ${selectedPlan.name}`;
        }
    }

    function sendOrder() {
        const user = document.getElementById('user-target').value;
        if(!user) return alert("Por favor, digite seu @!");
        
        const msg = encodeURIComponent(
            `🛒 *NOVO PEDIDO - ${DATA.brand}${DATA.brandHighlight}*\n\n` +
            `⭐ *Serviço:* ${selectedPlan.name}\n` +
            `💵 *Valor:* ${selectedPlan.price}\n` +
            `👤 *Perfil:* ${user}\n\n` +
            `Aguardando instruções para pagamento!`
        );
        window.open(`https://wa.me/${DATA.whatsapp}?text=${msg}`, '_blank');
    }

    window.onload = fetchData;
</script>
</body>
</html>
