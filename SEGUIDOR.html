<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPELAB | VITRINNI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --main: #8b5cf6; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:Poppins,sans-serif; }
        body { background:#0b1020; color:white; overflow-x:hidden; }
        .bg { position:fixed; inset:0; z-index:-1; background: radial-gradient(circle at top left,rgba(139, 92, 246, 0.15),transparent 30%), linear-gradient(-45deg,#0b1020,#11182b,#0f1726); background-size:300% 300%; animation:bg 10s ease infinite; }
        @keyframes bg { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        header { text-align:center; padding:50px 20px 30px; }
        .logo { font-size:72px; font-weight:800; letter-spacing:4px; text-transform: uppercase; }
        .logo .highlight { color:var(--main); text-shadow:0 0 20px var(--main); }
        .hero { margin-top:14px; font-size:24px; font-weight:700; opacity: 0.8; }
        .live-stats { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .live-item { background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 50px; font-size: 11px; border: 1px solid rgba(255,255,255,0.1); }
        .dot { height: 8px; width: 8px; background-color: #00ff88; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #notification-toast { position: fixed; bottom: 20px; left: 20px; background: rgba(15, 23, 42, 0.95); border: 1px solid var(--main); padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 12px; z-index: 9999; transform: translateX(-150%); transition: 0.5s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #notification-toast.show { transform: translateX(0); }
        .tabs { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .tab-btn { padding: 12px 25px; border-radius: 100px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: var(--main); box-shadow: 0 0 15px var(--main); }
        .container { max-width:900px; margin:auto; padding:20px; padding-bottom:120px; }
        .cards { display:grid; gap:18px; }
        .card { padding:24px; border-radius:26px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.06); transition:.25s; cursor:pointer; }
        .card.active { border-color:var(--main); transform:scale(1.02); background: rgba(139, 92, 246, 0.05); box-shadow: 0 0 30px rgba(139, 92, 246, 0.1); }
        .price { margin-top:10px; font-size:38px; font-weight:800; color:var(--main); }
        .form { margin-top:24px; padding:24px; border-radius:24px; background:rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,.06); }
        input { width:100%; padding:15px; border:none; border-radius:16px; background:rgba(255,255,255,.05); color:white; margin-top:14px; outline: none; border: 1px solid transparent; transition: 0.3s; }
        input:focus { border-color: var(--main); }
        button#cta { width:100%; padding:18px; margin-top:16px; border:none; border-radius:18px; background: var(--main); color:white; font-size:16px; font-weight:800; cursor:pointer; transition:.25s; text-transform: uppercase; }
        button#cta:hover { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
</head>
<body>
    <div class="bg"></div>

    <div id="notification-toast">
        <div style="font-size: 20px;">🚀</div>
        <div class="toast-content">
            <b id="toast-user" style="color:var(--main); font-size:13px; display:block;">Carregando...</b>
            <span id="toast-msg" style="font-size:12px;">Acabou de comprar!</span>
        </div>
    </div>

    <header>
        <div class="logo"><span id="brand1"></span><span class="highlight" id="brand2"></span></div>
        <div class="hero" id="hero"></div>
        <div class="live-stats">
            <div class="live-item"><span class="dot"></span> <span id="count-online">142</span> online</div>
            <div class="live-item">🔥 <span id="count-orders">1,240</span> pedidos hoje</div>
        </div>
    </header>

    <div class="container">
        <div class="tabs" id="category-tabs"></div>
        <div class="cards" id="plans-list"></div>
        <div class="form">
            <input type="text" id="user-input" placeholder="Digite seu @ ou Link do Perfil">
            <button onclick="finishOrder()" id="cta">Escolha um Pacote</button>
        </div>
    </div>

    <script>
        let CONFIG = {};
        let selectedPlan = null;
        let currentCategoryIndex = 0;

        // --- LÓGICA DE DETECÇÃO DE CLIENTE (GITHUB PAGES) ---
        const urlParams = new URLSearchParams(window.location.search);
        const clientId = urlParams.get('id'); 

        // Se tiver ?id=levelup na URL, busca em Clientes/levelup.json
        // Se não tiver, usa o arquivo padrão config_Seguidor.json
        const jsonPath = clientId ? `./Clientes/${clientId}.json` : './config_Seguidor.json';

        fetch(jsonPath)
            .then(res => {
                if(!res.ok) throw new Error("Arquivo não encontrado");
                return res.json();
            })
            .then(data => {
                CONFIG = data;
                applyConfig();
                startSocialProof();
            })
            .catch(err => {
                console.error("Erro ao carregar dados:", err);
                alert("Erro: ID de Vitrine não encontrado.");
            });

        function applyConfig() {
            document.documentElement.style.setProperty('--main', CONFIG.color || '#8b5cf6');
            document.getElementById('brand1').innerText = CONFIG.brand || 'HYPE';
            document.getElementById('brand2').innerText = CONFIG.brandHighlight || 'LAB';
            document.getElementById('hero').innerText = CONFIG.hero || 'Especialista em SMM';
            renderTabs();
            renderCategory(0);
        }

        function renderTabs() {
            const container = document.getElementById('category-tabs');
            container.innerHTML = CONFIG.categories.map((cat, i) => `
                <button class="tab-btn ${i === 0 ? 'active' : ''}" onclick="changeTab(this, ${i})">
                    ${cat.icon || '🚀'} ${cat.name}
                </button>
            `).join('');
        }

        function changeTab(btn, index) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCategory(index);
        }

        function renderCategory(idx) {
            currentCategoryIndex = idx;
            const list = document.getElementById('plans-list');
            const plans = CONFIG.categories[idx].plans;
            
            list.innerHTML = plans.map((p, i) => `
                <div class="card" onclick="selectPlan(this, ${idx}, ${i})">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h3 style="font-size:18px;">${p.name}</h3>
                        ${p.badge ? `<span style="background:var(--main); font-size:10px; padding:3px 8px; border-radius:50px; font-weight:bold;">${p.badge}</span>` : ''}
                    </div>
                    <div class="price">${p.price}</div>
                    <p style="font-size:12px; opacity:0.6; margin-top:10px;">${p.description || p.quality || ''}</p>
                </div>
            `).join('');
            
            // Seleciona o primeiro por padrão
            const firstCard = list.querySelector('.card');
            if(firstCard) firstCard.click();
        }

        function selectPlan(el, cIdx, pIdx) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            selectedPlan = CONFIG.categories[cIdx].plans[pIdx];
            document.getElementById('cta').innerText = `Comprar ${selectedPlan.name}`;
        }

        function finishOrder() {
            const user = document.getElementById('user-input').value.trim();
            if(!selectedPlan || !user) return alert("Por favor, selecione um plano e informe o seu perfil!");
            
            const msg = `🚀 *NOVO PEDIDO HYPELAB*\n\n📦 *Pacote:* ${selectedPlan.name}\n💰 *Valor:* ${selectedPlan.price}\n👤 *Perfil/Link:* ${user}`;
            window.open(`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function startSocialProof() {
            // Contador Online Aleatório
            setInterval(() => {
                const online = Math.floor(Math.random() * (190 - 130) + 130);
                document.getElementById('count-online').innerText = online;
            }, 7000);

            // Toasts de Vendas
            const names = ["Marcos", "Ana", "Felipe", "Julia", "Lucas", "Carla", "Beatriz", "Ricardo", "Amanda", "Gustavo"];
            const actions = ["1.000 Seguidores", "500 Curtidas", "10.000 Views", "5.000 Seguidores"];

            setInterval(() => {
                const name = names[Math.floor(Math.random() * names.length)];
                const action = actions[Math.floor(Math.random() * actions.length)];
                const toast = document.getElementById('notification-toast');
                
                document.getElementById('toast-user').innerText = `${name} (Acabou de comprar)`;
                document.getElementById('toast-msg').innerText = `Pacote: ${action}`;
                
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 5000);
            }, Math.random() * (20000 - 12000) + 12000);
        }
    </script>
</body>
</html>
