<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEL UP | Professional SMM</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --main: #00ff00; --bg-dark: #06080c; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        body { background: var(--bg-dark); color:white; overflow-x:hidden; }

        /* Pop-up de Vendas */
        #sale-popup {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            transform: translateY(150%);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #sale-popup.active { transform: translateY(0); }
        .popup-dot { width: 8px; height: 8px; background: var(--main); border-radius: 50%; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }

        /* Design de Cards e Background */
        .bg-wrapper { position: fixed; inset: 0; z-index: -1; background: var(--bg-dark); overflow: hidden; }
        .light-blob { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0, 255, 0, 0.05) 0%, transparent 70%); border-radius: 50%; filter: blur(80px); animation: move 20s infinite alternate ease-in-out; }
        @keyframes move { 0% { transform: translate(-10%, -10%); } 100% { transform: translate(20%, 10%); } }

        .card { padding:24px; border-radius:28px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,.06); transition: 0.3s; cursor: pointer; }
        .card.active { border-color: var(--main); background: rgba(255,255,255,0.04); transform: scale(1.02); }
        .tab-btn { padding: 12px 22px; border-radius: 100px; background: rgba(255,255,255,0.03); font-size: 11px; font-weight: 700; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; white-space: nowrap; }
        .tab-btn.active { background: var(--main); color: black; border-color: var(--main); }
        
        .price { font-size: 32px; font-weight: 800; color: var(--main); letter-spacing: -1px; }
        .input-hero { width:100%; padding:18px; border-radius:18px; background: rgba(0,0,0,0.3); color:white; border: 1px solid rgba(255,255,255,0.1); outline:none; transition: 0.3s; }
        .input-hero:focus { border-color: var(--main); }
        
        #cta { width:100%; padding:20px; border-radius:18px; background: var(--main); color:black; font-weight:800; text-transform: uppercase; transition: 0.3s; border: none; cursor: pointer; }
        #cta:hover { filter: brightness(1.1); box-shadow: 0 0 20px rgba(0,255,0,0.3); }

        .about-box { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 32px; padding: 30px; }
    </style>
</head>
<body>

<div class="bg-wrapper"><div class="light-blob" style="top:-5%; left:-5%;"></div></div>

<!-- Pop-up de Emergência -->
<div id="sale-popup">
    <div class="popup-dot"></div>
    <div class="text-[11px] leading-tight">
        <p class="text-gray-400">Novo pedido de <b class="text-white" id="pop-user">@marcos...</b></p>
        <p class="font-bold text-white" id="pop-item">5.000 Seguidores</p>
    </div>
</div>

<header class="text-center pt-16 pb-8 px-6">
    <div class="logo text-5xl font-extrabold uppercase tracking-tighter"><span id="b1"></span><span class="text-[var(--main)]" id="b2"></span></div>
    <p class="text-gray-400 mt-4 font-medium" id="hero-text"></p>
    
    <div class="flex justify-center gap-10 mt-8">
        <div class="text-center"><p class="text-2xl font-black" id="s-vendas">0</p><p class="text-[9px] uppercase opacity-40 tracking-widest">Pedidos</p></div>
        <div class="text-center"><p class="text-2xl font-black" id="s-online">0</p><p class="text-[9px] uppercase opacity-40 tracking-widest">Online</p></div>
    </div>
</header>

<div class="max-w-[600px] mx-auto p-5 space-y-10">
    <!-- Seleção -->
    <div class="flex gap-3 overflow-x-auto pb-2" id="tab-list"></div>

    <!-- Planos -->
    <div class="grid gap-4" id="plans-grid"></div>

    <!-- Checkout -->
    <div class="bg-white/5 p-6 rounded-[32px] border border-white/5">
        <p class="text-[10px] font-bold text-gray-500 uppercase mb-4 tracking-widest text-center">Configurações do Pedido</p>
        <input type="text" id="user-target" placeholder="Seu @usuário ou Link do post" class="input-hero mb-4">
        <button onclick="sendOrder()" id="cta">Escolha um Plano</button>
    </div>

    <!-- Quem Somos (Estilo Unika) -->
    <section class="pt-10">
        <div class="about-box space-y-6">
            <img id="aboutImg" class="w-full h-48 object-cover rounded-2xl shadow-2xl">
            <h2 id="aboutTitle" class="text-3xl font-extrabold leading-tight"></h2>
            <div id="aboutText" class="text-sm text-gray-400 leading-relaxed space-y-3"></div>
        </div>
    </section>

    <footer class="text-center py-10 opacity-30 text-[11px]" id="footer-text"></footer>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const storeID = params.get('id') || 'seguidor';
    let DATA = {};
    let selectedPlan = null;

    async function init() {
        try {
            const res = await fetch(`https://hypelabdev.github.io/Vitrinni/Clientes/${storeID}.json?v=${Date.now()}`);
            DATA = await res.json();
            
            document.documentElement.style.setProperty('--main', DATA.color);
            document.getElementById('b1').innerText = DATA.brand;
            document.getElementById('b2').innerText = DATA.brandHighlight;
            document.getElementById('hero-text').innerText = DATA.hero;
            document.getElementById('s-vendas').innerText = DATA.stats.sales;
            document.getElementById('s-online').innerText = DATA.stats.online;
            document.getElementById('footer-text').innerText = DATA.footer_text;

            // Sobre
            document.getElementById('aboutImg').src = DATA.about_section.about_image;
            document.getElementById('aboutTitle').innerText = DATA.about_section.about_title;
            document.getElementById('aboutText').innerHTML = `<p>${DATA.about_section.about_p1}</p><p>${DATA.about_section.about_p2}</p><p>${DATA.about_section.about_p3}</p>`;

            renderTabs();
            startPopups();
        } catch (e) { console.error(e); }
    }

    function renderTabs() {
        const list = document.getElementById('tab-list');
        DATA.categories.forEach((cat, i) => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${i===0?'active':''}`;
            btn.innerHTML = `${cat.icon} ${cat.name}`;
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                renderPlans(cat);
            };
            list.appendChild(btn);
        });
        renderPlans(DATA.categories[0]);
    }

    function renderPlans(cat) {
        const grid = document.getElementById('plans-grid');
        grid.innerHTML = '';
        cat.plans.forEach((plan, i) => {
            const card = document.createElement('div');
            card.className = `card ${i===0?'active':''}`;
            if(i===0) selectedPlan = plan;
            card.onclick = () => {
                document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
                card.classList.add('active');
                selectedPlan = plan;
                updateButton();
            };
            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div><h3 class="font-bold text-lg">${plan.name}</h3><div class="price">${plan.price}</div></div>
                    ${plan.badge?`<span class="bg-white/10 text-[9px] px-3 py-1 rounded-full font-bold border border-white/10">${plan.badge}</span>`:''}
                </div>
                <div class="mt-4 flex items-center gap-3 text-[10px] opacity-40 font-bold uppercase tracking-widest">
                    <span>⚡ Entrega Fast</span><span>•</span><span>🔒 Proteção SSL</span><span>•</span><span>${plan.quality}</span>
                </div>`;
            grid.appendChild(card);
        });
        updateButton();
    }

    function updateButton() { document.getElementById('cta').innerText = `Comprar ${selectedPlan.name}`; }

    function sendOrder() {
        const user = document.getElementById('user-target').value;
        if(!user) return alert("Digite o @usuário!");
        const msg = encodeURIComponent(`🚀 *NOVO PEDIDO*\n\n*Serviço:* ${selectedPlan.name}\n*Valor:* ${selectedPlan.price}\n*Perfil:* ${user}\n\n_Aguardando instruções de pagamento!_`);
        window.open(`https://wa.me/${DATA.whatsapp}?text=${msg}`, '_blank');
    }

    // Sistema de Pop-ups de Vendas Falsas (Gera Urgência)
    function startPopups() {
        const users = ['@clara_m', '@joao.v', '@thays.estilo', '@felipe_ofc', '@loja_modas', '@gabriel_dev', '@ana.lu'];
        const items = ['1.000 Seguidores', '500 Curtidas', '5.000 Visualizações', '10k Seguidores VIP', '3.000 Seguidores'];
        
        setInterval(() => {
            const popup = document.getElementById('sale-popup');
            document.getElementById('pop-user').innerText = users[Math.floor(Math.random()*users.length)];
            document.getElementById('pop-item').innerText = items[Math.floor(Math.random()*items.length)];
            
            popup.classList.add('active');
            setTimeout(() => popup.classList.remove('active'), 4000);
        }, 12000); // Aparece a cada 12 segundos
    }

    init();
</script>
</body>
</html>
