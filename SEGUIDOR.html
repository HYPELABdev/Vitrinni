<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPELAB | Engagement Flux</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;900&display=swap');
        
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .lux-text { font-family: 'Syncopate', sans-serif; }
        .gold-accent { color: #bc9c6c; }

        .particle-container { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .like-particle { position: absolute; color: #bc9c6c; opacity: 0; font-size: 14px; filter: drop-shadow(0 0 5px rgba(188, 156, 108, 0.3)); animation: floatUp linear infinite; }

        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0.5) rotate(0deg); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.2; }
            100% { transform: translateY(-20vh) scale(1.2) rotate(45deg); opacity: 0; }
        }

        .main-card { background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 4rem; padding: 3rem; text-align: center; z-index: 10; box-shadow: 0 40px 100px rgba(0,0,0,0.5); width: 90%; max-width: 450px; }
    </style>
</head>
<body>

    <div class="particle-container" id="particle-box"></div>

    <main class="main-card">
        <header class="mb-12">
            <h1 class="lux-text text-3xl tracking-tighter mb-2">HYPELAB<span class="gold-accent">.</span></h1>
            <div class="h-[1px] w-12 bg-[#bc9c6c] mx-auto mb-4"></div>
            <p class="text-[9px] uppercase tracking-[6px] opacity-40">Engagement Sync</p>
        </header>

        <section class="mb-12">
            <div id="counter" class="text-7xl font-black tracking-tighter mb-2">0</div>
            <p class="text-[10px] font-bold gold-accent uppercase tracking-[3px]">Seguidores engajados</p>
        </section>
    </main>

    <script>
        // CONFIGURAÇÃO CENTRAL
        const REPO = "SEU_USUARIO/Vitrinni"; 
        const JSON_PATH = "clientes/levelup.json";

        async function init() {
            spawnParticles();
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${REPO}/main/${JSON_PATH}?t=${Date.now()}`);
                const data = await res.json();
                // Lê o valor diretamente da pintura (levelup.json)
                const meta = data.configuracao?.seguidores_alvo || 0;
                animateNumber(meta);
            } catch(e) { animateNumber(0); }
        }

        function spawnParticles() {
            const container = document.getElementById('particle-box');
            for (let i = 0; i < 25; i++) {
                const heart = document.createElement('i');
                heart.className = 'fas fa-heart like-particle';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 8 + 7) + 's';
                heart.style.animationDelay = '-' + Math.random() * 10 + 's';
                container.appendChild(heart);
            }
        }

        function animateNumber(target) {
            let current = 0;
            const el = document.getElementById('counter');
            const interval = setInterval(() => {
                current += target / 100;
                if (current >= target) { clearInterval(interval); el.innerText = target.toLocaleString(); }
                else { el.innerText = Math.floor(current).toLocaleString(); }
            }, 30);
        }

        window.onload = init;
    </script>
</body>
</html>
