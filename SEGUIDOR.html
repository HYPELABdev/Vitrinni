<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEL UP | PAINEL SMM</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --main: #8b5cf6; } /* Cor padrão, será sobrescrita pelo JSON */
        * { margin:0; padding:0; box-sizing:border-box; font-family:Poppins,sans-serif; }
        body { background:#0b1020; color:white; overflow-x:hidden; }

        .bg { position:fixed; inset:0; z-index:-1; background: radial-gradient(circle at top left,rgba(139, 92, 246, 0.15),transparent 30%), linear-gradient(-45deg,#0b1020,#11182b,#0f1726); background-size:300% 300%; animation:bg 10s ease infinite; }
        @keyframes bg { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        header { text-align:center; padding:50px 20px 30px; }
        .logo { font-size:72px; font-weight:800; letter-spacing:4px; }
        .logo .highlight { color:var(--main); text-shadow:0 0 20px var(--main); }
        .hero { margin-top:14px; font-size:30px; font-weight:700; }

        /* NAVEGAÇÃO POR CATEGORIAS (O que você sentiu falta) */
        .tabs { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .tab-btn { 
            padding: 12px 25px; border-radius: 100px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); color: white; cursor: pointer; 
            font-weight: 600; transition: 0.3s; font-size: 14px;
        }
        .tab-btn.active { background: var(--main); border-color: var(--main); box-shadow: 0 0 15px var(--main); }

        .container { max-width:900px; margin:auto; padding:20px; padding-bottom:120px; }
        .cards { display:grid; gap:18px; }
        .card { 
            padding:24px; border-radius:26px; background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
            border:1px solid rgba(255,255,255,.06); transition:.25s; cursor:pointer; 
        }
        .card.active { border-color:var(--main); box-shadow:0 0 30px rgba(139, 92, 246, 0.2); transform:scale(1.02); }
        
        .top { display:flex; justify-content:space-between; align-items:center; }
        .badge { padding:6px 10px; border-radius:12px; background:rgba(255,255,255,.06); font-size:11px; font-weight: 700; }
        .price { margin-top:14px; font-size:42px; font-weight:800; color:var(--main); }
        .desc { margin-top:12px; color:#aab4c7; line-height:1.7; font-size:14px; }

        .form { margin-top:24px; padding:24px; border-radius:24px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06); }
        input { width:100%; padding:15px; border:none; border-radius:16px; background:rgba(255,255,255,.05); color:white; margin-top:14px; outline: none; }
        button#cta { 
            width:100%; padding:16px; margin-top:16px; border:none; border-radius:18px; 
            background: linear-gradient(45deg, var(--main), #a78bfa); color:white; 
            font-size:15px; font-weight:700; cursor:pointer; transition:.25s; 
        }

        @media(max-width:700px){ .logo{font-size:52px;} .hero{font-size:23px;} .price{font-size:36px;} }
    </style>
</head>

<body>
    <div class="bg"></div>
    <header>
        <div class="logo"><span id="brand1"></span><span class="highlight" id="brand2"></span></div>
        <div class="hero" id="hero"></div>
        <div class="sub" id="subtitle"></div>
    </header>

    <div class="container">
        <!-- BOTÕES DE CATEGORIA -->
        <div class="tabs" id="category-tabs"></div>

        <!-- LISTA DE PRODUTOS -->
        <div class="cards" id="plans-list"></div>

        <div class="form">
            <div class="form-title">Finalize seu pedido</div>
            <input type="text" id="instagram" placeholder="Digite seu @ do Instagram">
            <button onclick="finishOrder()" id="cta">🚀 Selecione um pacote</button>
        </div>
    </div>

    <script>
        let CONFIG = {};
        let selectedPlan = null;
        let currentCategoryIndex = 0;

        fetch('./config_Seguidor.json')
            .then(res => res.json())
            .then(data => {
                CONFIG = data;
                document.documentElement.style.setProperty('--main', CONFIG.color);
                document.getElementById('brand1').innerText = CONFIG.brand;
                document.getElementById('brand2').innerText = CONFIG.brandHighlight;
                document.getElementById('hero').innerText = CONFIG.hero;
                document.getElementById('subtitle').innerText = CONFIG.subtitle;
                
                renderTabs();
                renderCategory(0); // Começa na primeira categoria
            });

        function renderTabs() {
            const tabsContainer = document.getElementById('category-tabs');
            tabsContainer.innerHTML = CONFIG.categories.map((cat, index) => `
                <button class="tab-btn ${index === 0 ? 'active' : ''}" onclick="changeCategory(this, ${index})">
                    ${cat.icon} ${cat.name}
                </button>
            `).join('');
        }

        function changeCategory(btn, index) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCategory(index);
        }

        function renderCategory(index) {
            currentCategoryIndex = index;
            const list = document.getElementById('plans-list');
            const category = CONFIG.categories[index];
            
            list.innerHTML = category.plans.map((plan, pIndex) => `
                <div class="card" onclick="selectPlan(this, ${pIndex})">
                    <div class="top">
                        <h3>${plan.name}</h3>
                        <div class="badge">${plan.badge}</div>
                    </div>
                    <div class="price">${plan.price}</div>
                    <div class="desc">
                        ✨ ${plan.quality} | 🚀 Entrega: ${plan.delivery} <br>
                        ${plan.description}
                    </div>
                </div>
            `).join('');
            
            // Auto-selecionar o primeiro plano da categoria ao mudar
            const firstCard = list.querySelector('.card');
            if(firstCard) firstCard.click();
        }

        function selectPlan(element, index) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            selectedPlan = CONFIG.categories[currentCategoryIndex].plans[index];
            document.getElementById('cta').innerText = `🚀 Comprar ${selectedPlan.name}`;
        }

        function finishOrder() {
            let insta = document.getElementById('instagram').value.trim();
            if(!selectedPlan) return alert("Selecione um plano!");
            if(!insta) return alert("Digite o Instagram!");
            
            const msg = `🚀 NOVO PEDIDO\n\n📦 Pacote: ${selectedPlan.name}\n💰 Valor: ${selectedPlan.price}\n📸 Instagram: ${insta.startsWith('@') ? insta : '@'+insta}`;
            window.open(`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
