<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pro Store Engine</title>
<style>
/* Estilo Minimalista de Vendas (Compact) */
:root { --primary: #000; --bg: #fff; --text: #000; --gray: #f4f4f4; }
body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; }

/* Cards Compactos */
.catalog { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 10px; }
.card { border: 1px solid #eee; padding: 8px; text-align: center; cursor: pointer; }
.card img { width: 100%; height: 150px; object-fit: cover; }
.card h3 { font-size: 14px; margin: 8px 0; }
.card .price { font-weight: bold; font-size: 16px; }

/* Painel Admin (Restaurado) */
.admin-panel { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: white; z-index: 9999; overflow-y: auto; padding: 20px; box-shadow: -2px 0 5px rgba(0,0,0,0.1); transition: 0.3s; }
.admin-panel.open { right: 0; }
.field { margin-bottom: 15px; }
label { display: block; font-size: 12px; color: #666; }
input, textarea { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; }
</style>
</head>
<body>

<!-- Header -->
<header style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
  <h1 id="brandName" style="font-size: 20px;">Loja</h1>
  <button onclick="toggleAdmin()">Admin</button>
</header>

<!-- Catálogo -->
<div class="catalog" id="catalog"></div>

<!-- Painel Administrativo -->
<div class="admin-panel" id="adminPanel">
  <h2>Configurações</h2>
  <button onclick="toggleAdmin()">Fechar</button>
  
  <div class="field"><label>Nome da Loja</label><input type="text" id="editBrand"></div>
  <div class="field"><label>Cor Primária</label><input type="color" id="editColor"></div>
  <div class="field"><label>Produtos (JSON)</label><textarea id="editProducts" rows="10"></textarea></div>
  
  <button onclick="saveAll()">Salvar Alterações</button>
</div>

<script>
// Lógica de Renderização e Edição
function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('open'); }

function saveAll() {
  const data = {
    brand: document.getElementById('editBrand').value,
    color: document.getElementById('editColor').value,
    products: JSON.parse(document.getElementById('editProducts').value)
  };
  console.log("Salvar este JSON no seu servidor:", JSON.stringify(data));
  alert("Pronto para salvar via API!");
}

// Renderização baseada em dados
function render(data) {
  document.getElementById('brandName').innerText = data.brand;
  document.documentElement.style.setProperty('--primary', data.color);
  const cat = document.getElementById('catalog');
  cat.innerHTML = data.products.map(p => `
    <div class="card">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <div class="price">R$ ${p.price}</div>
    </div>
  `).join('');
}
</script>
</body>
</html>
