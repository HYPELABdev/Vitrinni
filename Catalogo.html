<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HYPELAB MINISITE PRO</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* --- DESIGN SYSTEM & CSS VARIABLES --- */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Plus Jakarta Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
}

:root{
    --primary: #ff0000;
    --primary-glow: rgba(255, 0, 0, 0.25);
    --bg: #050505;
    --surface: rgba(15, 15, 15, 0.6);
    --surface-accent: rgba(255, 255, 255, 0.05);
    --border: rgba(255, 255, 255, 0.08);
    --text: #ffffff;
    --text-muted: #8e8e93;
    --neon-green: #00ff9d;
    --neon-green-glow: rgba(0, 255, 157, 0.25);
}

body{
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    min-height: 100vh;
}

/* Scrollbar Custom */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #050505; }
::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }

/* --- HEADER DINÂMICO --- */
header{
    padding: 20px 24px;
    background: rgba(5, 5, 5, 0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
    transition: all 0.3s ease;
}

/* Modificadores de Alinhamento via JS */
header.align-center {
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
    text-align: center;
}
header.align-center .header-actions {
    width: 100%;
    justify-content: center;
}

header.align-left {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

#brandContainer {
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.3s ease;
}
header.align-center #brandContainer {
    flex-direction: column;
    gap: 8px;
}

#brandLogo {
    height: 55px;
    width: auto;
    object-fit: contain;
    display: none;
    border-radius: 12px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    transition: all 0.3s ease;
}
header.align-center #brandLogo {
    height: 75px;
}

#brandName{
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #fff 30%, var(--text-muted));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.header-actions {
    display: flex;
    gap: 10px;
}

/* --- BOTÕES PREMIUM --- */
.btn{
    padding: 12px 20px;
    border: 1px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    font-weight: 700;
    font-size: 0.85rem;
    background: var(--surface-accent);
    color: #fff;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    display: inline-flex;
    align-items: center;
    gap: 8px;
}
.btn:hover{
    background: #fff;
    color: #000;
    transform: translateY(-2px);
}
.btn.primary{
    background: var(--primary);
    border-color: transparent;
    box-shadow: 0 4px 14px var(--primary-glow);
}
.btn.primary:hover{
    background: #fff;
    color: #000;
    box-shadow: 0 6px 22px rgba(255,255,255,0.25);
}

/* --- CARROSSEL / BANNER SLIDER --- */
.banner-section {
    max-width: 1350px;
    margin: 20px auto 0 auto;
    padding: 0 24px;
    display: none;
}
.banner-wrapper {
    width: 100%;
    display: flex;
    gap: 16px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
    border-radius: 20px;
}
.banner-wrapper::-webkit-scrollbar { display: none; }

.banner-item {
    min-width: 100%;
    scroll-snap-align: start;
    height: 240px;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    border: 1px solid var(--border);
    background: #0a0a0a;
}
.banner-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* --- TABS / CATEGORIAS DINÂMICAS --- */
.category-container {
    max-width: 1350px;
    margin: 24px auto 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
}
.category-container::-webkit-scrollbar { display: none; }

.tab-btn {
    padding: 10px 20px;
    background: var(--surface-accent);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 99px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.25s ease;
}
.tab-btn.active, .tab-btn:hover {
    background: #fff;
    color: #000;
    border-color: #fff;
    font-weight: 700;
}

/* --- CATALOG GRID & CARDS INTERATIVOS --- */
.catalog{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
    padding: 32px 24px;
    max-width: 1350px;
    margin: 0 auto;
}

.card{
    background: var(--surface);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
}
.card:hover{
    transform: translateY(-8px);
    border-color: rgba(255,255,255,0.25);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

.card-img-wrapper {
    width: 100%;
    height: 240px;
    overflow: hidden;
    position: relative;
    background: #0d0d0d;
}
.card img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.card:hover .card-img-wrapper img {
    transform: scale(1.06);
}

.card-content{
    padding: 20px;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
}

.card-content h4 {
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 6px;
    line-height: 1.3;
}

.product-desc {
    font-size: 0.85rem;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 16px;
}

/* INTERATIVIDADE: Seletores Visuais de Tamanho/Cor */
.product-variants {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
    padding-top: 12px;
    border-top: 1px dashed var(--border);
}
.variant-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    font-weight: 700;
}
.variant-options {
    display: flex;
    gap: 6px;
}
.chip {
    padding: 4px 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
}
.chip.active {
    background: #fff;
    color: #000;
    border-color: #fff;
}
.color-dot {
    width: 18px;
    height: 18px;
    border-radius: 99px;
    cursor: pointer;
    border: 2px solid transparent;
}
.color-dot.active {
    border-color: #fff;
}

/* Preço Gigante Neon */
.price{
    color: var(--neon-green);
    font-weight: 800;
    font-size: 1.55rem;
    margin-top: auto;
    margin-bottom: 16px;
    text-shadow: 0 0 12px var(--neon-green-glow);
    display: flex;
    align-items: baseline;
    gap: 4px;
}
.price::before {
    content: 'R$';
    font-size: 0.9rem;
    font-weight: 600;
}

.actions{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}
.actions .buy{
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: var(--primary);
    color: #fff;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s ease;
}
.actions .cartBtn{
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    color: #fff;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s ease;
}
.actions .buy:hover, .actions .cartBtn:hover { transform: scale(1.02); }

/* --- SACARRINHO FLOATING CARD --- */
.cart-floating-card {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    width: 340px;
    z-index: 90;
    box-shadow: 0 15px 40px rgba(0,0,0,0.7);
    display: none;
}
.cart-floating-card h4 {
    font-size: 0.95rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
}
.cart-items-container { max-height: 150px; overflow-y: auto; margin-bottom: 14px; }
.cart-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
}
.cart-item .remove-item { color: var(--primary); cursor: pointer; font-size: 0.8rem; }
.cart-floating-card .total {
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-weight: 800;
    font-size: 1.2rem;
    color: var(--neon-green);
    text-shadow: 0 0 10px var(--neon-green-glow);
}

/* --- DASHBOARD EDITOR (SIDE PANEL) --- */
.panel{
    position: fixed;
    right: -100%;
    top: 0;
    width: 100%;
    max-width: 440px;
    height: 100vh;
    background: rgba(6, 6, 6, 0.96);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    padding: 28px;
    overflow-y: auto;
    transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 1000;
    border-left: 1px solid var(--border);
    box-shadow: -15px 0 40px rgba(0,0,0,0.6);
}
.panel.active{ right: 0; }
.panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.close-panel-btn {
    background: var(--surface-accent); border: 1px solid var(--border); color: #fff;
    width: 36px; height: 36px; border-radius: 10px; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
}

.section-title{
    font-size: 11px; color: var(--primary); margin: 24px 0 12px 0;
    font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
}

/* Custom File Upload Styling (Estilo App) */
.file-upload-container {
    position: relative;
    width: 100%;
    margin-bottom: 12px;
}
.file-upload-btn {
    display: block; width: 100%; padding: 12px; background: rgba(255,255,255,0.04);
    border: 1px dashed var(--border); border-radius: 12px; text-align: center;
    font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.file-upload-btn:hover { background: rgba(255,255,255,0.08); border-color: var(--primary); }
.file-upload-container input[type="file"] {
    position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;
}

label { font-size: 11px; color: var(--text-muted); font-weight: 600; display: block; margin-top: 12px; }
input, textarea, select{
    width: 100%; padding: 12px; margin: 6px 0 12px 0; border-radius: 12px;
    border: 1px solid var(--border); background: rgba(255,255,255,0.02); color: #fff;
    font-size: 0.9rem; transition: all 0.2s ease;
}
input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); background: rgba(255,255,255,0.05); }
input[type="color"] { height: 44px; padding: 4px; cursor: pointer; }

.editor-product-list { border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); max-height: 160px; overflow-y: auto; }
.editor-product-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
.delete-prod-btn { background: rgba(255,0,0,0.15); color: #ff3b30; border: 1px solid rgba(255,0,0,0.2); padding: 5px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.75rem; }
.delete-prod-btn:hover { background: #ff3b30; color: #fff; }

#loadingStatus { text-align: center; padding: 60px 20px; font-size: 1.1rem; font-weight: 700; color: var(--primary); }

@media(max-width: 768px) {
    .catalog { padding: 16px; gap: 16px; }
    .cart-floating-card { width: calc(100% - 32px); left: 16px; right: 16px; bottom: 16px; }
    body { padding-bottom: 180px; }
    header.align-left { flex-direction: column; gap: 16px; text-align: center; }
}
</style>
</head>

<body>

<header id="mainHeader" class="align-center">
    <div id="brandContainer">
        <img id="brandLogo" src="" alt="Logo">
        <h3 id="brandName">STORE</h3>
    </div>
    <div class="header-actions">
        <button class="btn" onclick="openEditor()">🛠️ Admin</button>
        <button class="btn primary" onclick="checkout()">⚡ Finalizar</button>
    </div>
</header>

<!-- Seção Banners Slider -->
<div class="banner-section" id="bannerSection">
    <div class="banner-wrapper" id="bannerWrapper"></div>
</div>

<!-- Barra de Categorias Dinâmica -->
<div class="category-container" id="categoryContainer"></div>

<div id="loadingStatus">⚡ Sincronizando com a Infraestrutura Hypelab...</div>
<div class="catalog" id="catalog" style="display:none;"></div>

<!-- Carrinho Mobile Premium -->
<div class="cart-floating-card" id="cartCard">
    <h4><span>🛒 Sacola Ativa</span> <span id="cartCount" style="color: var(--primary)">0</span></h4>
    <div class="cart-items-container" id="cartItems"></div>
    <div class="total" id="total">Total: R$ 0,00</div>
</div>

<!-- Painel Admin -->
<div class="panel" id="panel">
    <div class="panel-header">
        <h3>Design System & Items</h3>
        <button class="close-panel-btn" onclick="document.getElementById('panel').classList.remove('active')">×</button>
    </div>

    <div class="section-title">Layout & Identidade</div>
    
    <label>Nome da Marca (Suporta Emojis 🔥)</label>
    <input id="brandInput" placeholder="Ex: TIO SAM 🎭">

    <label>Alinhamento do Topo</label>
    <select id="logoAlignInput">
        <option value="center">Centralizado (Estilo Minisite)</option>
        <option value="left">Lateral (Estilo Tradicional)</option>
    </select>

    <label>Upload da Logo (Direto do Celular)</label>
    <div class="file-upload-container">
        <span class="file-upload-btn" id="logoUploadLabel">Selecionar Foto da Logo</span>
        <input type="file" id="logoFileInput" accept="image/*" onchange="uploadConverter(this, 'logo')">
    </div>

    <label>WhatsApp Comercial</label>
    <input id="whatsInput" placeholder="Ex: 5511949946730">

    <div class="section-title">Visual Engine</div>
    
    <label>Cor do Tema</label>
    <input type="color" id="colorInput">

    <label>Upload Banner Promocional</label>
    <div class="file-upload-container">
        <span class="file-upload-btn" id="bannerUploadLabel">Adicionar Foto ao Slider</span>
        <input type="file" id="bannerFileInput" accept="image/*" onchange="uploadConverter(this, 'banner')">
    </div>

    <button id="btnSaveConfig" class="btn primary" style="width:100%; justify-content:center; margin-top:10px;" onclick="saveConfig()">Salvar Configurações</button>

    <hr style="margin:24px 0; border: none; border-top:1px solid var(--border);">

    <div class="section-title">Estoque & Produtos</div>

    <label>Nome do Produto</label>
    <input id="pName" placeholder="Ex: Smartwatch Cyber X">
    
    <label>Preço Unitário</label>
    <input id="pPrice" placeholder="Ex: 399.90">

    <label>Categoria do Produto</label>
    <input id="pCategory" placeholder="Ex: Wearables, Som, Setup">
    
    <label>Foto do Produto (Upload Celular)</label>
    <div class="file-upload-container">
        <span class="file-upload-btn" id="productUploadLabel">Escolher Imagem do Produto</span>
        <input type="file" id="productFileInput" accept="image/*" onchange="uploadConverter(this, 'product')">
    </div>
    
    <label>Descrição do Item</label>
    <textarea id="pDesc" rows="2" placeholder="Especificações curtas..."></textarea>

    <button id="btnAddProduct" class="btn primary" style="width:100%; justify-content:center; margin-bottom:20px;" onclick="addProduct()">Cadastrar Produto</button>

    <label style="font-weight:700; color: var(--text); text-transform: uppercase; font-size:11px; margin-bottom:6px;">Produtos Indexados:</label>
    <div class="editor-product-list" id="editorProductList"></div>
</div>

<script>
const PASSWORD = "KALLI420";
const urlParams = new URLSearchParams(window.location.search);
const nomeDaLoja = urlParams.get('loja');

// Estrutura Base em conformidade estrita com o seu JSON
let config = {
    brand: "HYPELAB",
    logo: "",
    whats: "5511999999999",
    color: "#ff0000",
    bg: "#050505",
    logoAlign: "center", // Fallback seguro
    banners: []          // Fallback seguro
};

let products = [];
let cart = [];
let currentCategory = "Todos";
let tempLogoBase64 = "";
let tempProductBase64 = "";

// FUNÇÕES DE DOWNLOAD/UPLOAD SEM ALTERAR AS ROTAS VERCEL
async function carregarDadosDoServidor() {
    if (!nomeDaLoja) {
        document.getElementById("loadingStatus").innerHTML = "❌ Setup Incompleto: Insira <code>?loja=NOME</code> na URL.";
        return;
    }
    try {
        const response = await fetch(`/api/github?caminho=Clientes/${nomeDaLoja}.json`);
        if (!response.ok) throw new Error("Novo registro.");
        
        const dados = await response.json();
        config = dados.config || config;
        products = dados.products || [];
        
        // Assegura injeção de fallbacks se chaves não existirem no arquivo carregado
        if(!config.logoAlign) config.logoAlign = "center";
        if(!config.banners) config.banners = [];

        document.getElementById("loadingStatus").style.display = "none";
        document.getElementById("catalog").style.display = "grid";
        render();
    } catch (erro) {
        document.getElementById("loadingStatus").innerHTML = "✨ Catálogo novo detectado. Abra o menu 'Admin' para salvar e inicializar.";
        document.getElementById("catalog").style.display = "grid";
        render();
    }
}

async function salvarDadosNoServidor() {
    if (!nomeDaLoja) return alert("ID do catálogo ausente.");
    const btnConfig = document.getElementById("btnSaveConfig");
    const btnProd = document.getElementById("btnAddProduct");
    btnConfig.innerText = "Sincronizando Nuvem... ⏳";
    btnProd.innerText = "Sincronizando Nuvem... ⏳";

    try {
        await fetch(`/api/github?caminho=Clientes/${nomeDaLoja}.json`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ config, products })
        });
    } catch (erro) {
        console.error("Erro sincronia: " + erro.message);
    } finally {
        btnConfig.innerText = "Salvar Configurações";
        btnProd.innerText = "Cadastrar Produto";
    }
}

// CONVERSOR REATIVO DE IMAGEM DO SMARTPHONE (FileReader Engine)
function uploadConverter(input, target) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const base64String = e.target.result;
        if (target === 'logo') {
            tempLogoBase64 = base64String;
            document.getElementById("logoUploadLabel").innerText = "✓ Imagem Carregada";
        } else if (target === 'product') {
            tempProductBase64 = base64String;
            document.getElementById("productUploadLabel").innerText = "✓ Imagem Carregada";
        } else if (target === 'banner') {
            config.banners.push(base64String); // Armazena string limpa direto no array de config
            document.getElementById("bannerUploadLabel").innerText = "✓ Banner Adicionado";
            render();
            salvarDadosNoServidor();
        }
    };
    reader.readAsDataURL(file);
}

/* RENDER ENGINE VISUAL */
function render(){
    // Manipulação dinâmica de alinhamento
    const header = document.getElementById("mainHeader");
    header.className = config.logoAlign === 'left' ? 'align-left' : 'align-center';

    document.getElementById("brandName").innerHTML = config.brand;
    
    if(config.logo && config.logo.trim() !== "") {
        document.getElementById("brandLogo").src = config.logo;
        document.getElementById("brandLogo").style.display = "block";
    } else {
        document.getElementById("brandLogo").style.display = "none";
    }

    // CSS Variables Injection
    document.documentElement.style.setProperty('--primary', config.color);
    document.documentElement.style.setProperty('--primary-glow', config.color + '40');

    /* RENDER SLIDER BANNERS */
    const bannerSection = document.getElementById("bannerSection");
    const bannerWrapper = document.getElementById("bannerWrapper");
    if(config.banners && config.banners.length > 0) {
        bannerSection.style.display = "block";
        bannerWrapper.innerHTML = config.banners.map(b => `
            <div class="banner-item"><img src="${b}"></div>
        `).join('');
    } else {
        bannerSection.style.display = "none";
    }

    /* RENDER TABS DE CATEGORIAS */
    const categorias = ["Todos", ...new Set(products.map(p => p.category).filter(c => c && c.trim() !== ""))];
    const categoryContainer = document.getElementById("categoryContainer");
    categoryContainer.innerHTML = categorias.map(cat => `
        <button class="tab-btn ${currentCategory === cat ? 'active' : ''}" onclick="setCategory('${cat}')">${cat}</button>
    `).join('');

    /* RENDER PRODUCT FEED */
    const filteredProducts = currentCategory === "Todos" ? products : products.filter(p => p.category === currentCategory);
    const catalog = document.getElementById("catalog");
    
    if(filteredProducts.length === 0) {
        catalog.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:var(--text-muted); padding:40px 0;">Nenhum item localizado nesta seção.</div>`;
    } else {
        catalog.innerHTML = filteredProducts.map((p, i) => {
            // Localiza índice real no array global
            const realIndex = products.indexOf(p);
            return `
                <div class="card">
                    <div class="card-img-wrapper">
                        <img src="${p.img || 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500'}" onerror="this.src='https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500'">
                    </div>
                    <div class="card-content">
                        <h4>${p.name}</h4>
                        <p class="product-desc">${p.desc || 'Sem detalhes técnicos.'}</p>
                        
                        <!-- Variações Interativas Mockadas para visual do cliente -->
                        <div class="product-variants">
                            <div class="variant-title">Opções Disponíveis</div>
                            <div class="variant-options">
                                <span class="chip active">Padrão</span>
                                <span class="chip">Premium</span>
                            </div>
                        </div>

                        <div class="price">${parseFloat(p.price || 0).toFixed(2).replace('.', ',')}</div>
                        <div class="actions">
                            <button class="cartBtn" onclick="addCart(${realIndex})">Sacola</button>
                            <button class="buy" onclick="buyDirect('${p.name}', '${p.price}')">Comprar</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    renderCart();
    renderEditorProductList();
}

function setCategory(cat) {
    currentCategory = cat;
    render();
}

/* LOGICA SACARRINHO */
function addCart(i){ cart.push(products[i]); renderCart(); }
function removeCart(i){ cart.splice(i, 1); renderCart(); }

function renderCart(){
    const cartCard = document.getElementById("cartCard");
    if(cart.length === 0) { cartCard.style.display = "none"; return; }
    
    cartCard.style.display = "block";
    document.getElementById("cartCount").innerText = cart.length;
    
    let total = 0;
    document.getElementById("cartItems").innerHTML = cart.map((c, i) => {
        let price = parseFloat(String(c.price).replace(',', '.'));
        if(!isNaN(price)){ total += price; }
        return `
            <div class="cart-item">
                <span>📦 ${c.name}</span>
                <span class="remove-item" onclick="removeCart(${i})">Remover</span>
            </div>
        `;
    }).join('');

    document.getElementById("total").innerText = "Total: R$ " + total.toFixed(2).replace('.', ',');
}

/* REDIRECTS WHATSAPP ENGINE */
function buyDirect(nome, preco){
    let valor = parseFloat(String(preco).replace(',', '.')).toFixed(2).replace('.', ',');
    let msg = `🔥 *Interesse de Compra - ${config.brand}*\n\nOlá! Tenho interesse imediato no produto:\n📦 *${nome}*\n💰 Valor: R$ ${valor}\n\nComo prossigo com a transação?`;
    window.open(`https://wa.me/${config.whats}?text=${encodeURIComponent(msg)}`);
}

function checkout(){
    if(cart.length === 0) return;
    let msg = `🔥 *Novo Pedido - ${config.brand}*\n\n`;
    let total = 0;
    cart.forEach(c => {
        let price = parseFloat(String(c.price).replace(',', '.'));
        msg += `▪️ 1x *${c.name}* - R$ ${price.toFixed(2).replace('.', ',')}\n`;
        total += price;
    });
    msg += `\n🏁 *Total Geral:* R$ ${total.toFixed(2).replace('.', ',')}\n\nAguardando instruções de pagamento.`;
    window.open(`https://wa.me/${config.whats}?text=${encodeURIComponent(msg)}`);
}

/* ACTIONS INVENTÁRIO */
function addProduct(){
    const pName = document.getElementById("pName");
    const pPrice = document.getElementById("pPrice");
    const pCategory = document.getElementById("pCategory");
    const pDesc = document.getElementById("pDesc");

    if(!pName.value || !pPrice.value) return alert("Insira nome e preço do produto.");

    products.push({
        name: pName.value,
        price: pPrice.value.replace(',', '.'),
        category: pCategory.value || "Geral",
        img: tempProductBase64, // Grava a string Base64 capturada pelo upload nativo
        desc: pDesc.value
    });

    tempProductBase64 = "";
    document.getElementById("productUploadLabel").innerText = "Selecionar Foto da Logo";
    
    render();
    salvarDadosNoServidor();

    pName.value = ""; pPrice.value = ""; pCategory.value = ""; pDesc.value = "";
    document.getElementById("productFileInput").value = "";
}

function deleteProduct(i){
    if(confirm("Confirmar exclusão deste produto do banco de dados remetente?")){
        products.splice(i, 1);
        render();
        salvarDadosNoServidor();
    }
}

function renderEditorProductList(){
    document.getElementById("editorProductList").innerHTML = products.map((p, i) => `
        <div class="editor-product-item">
            <span style="font-weight:600; text-overflow:ellipsis; overflow:hidden; white-space:nowrap; max-width:200px;">${p.name} [${p.category || 'Geral'}]</span>
            <button class="delete-prod-btn" onclick="deleteProduct(${i})">Deletar</button>
        </div>
    `).join('');
}

/* CONFIG PANEL CONTROLLERS */
function saveConfig(){
    config.brand = document.getElementById("brandInput").value;
    config.logoAlign = document.getElementById("logoAlignInput").value;
    config.whats = document.getElementById("whatsInput").value;
    config.color = document.getElementById("colorInput").value;
    
    if(tempLogoBase64 !== "") {
        config.logo = tempLogoBase64;
        tempLogoBase64 = "";
        document.getElementById("logoUploadLabel").innerText = "Selecionar Foto da Logo";
    }

    render();
    document.getElementById("panel").classList.remove("active");
    salvarDadosNoServidor();
    document.getElementById("logoFileInput").value = "";
}

function openEditor(){
    let pass = prompt("Senha Master:");
    if(pass !== PASSWORD) return alert("Acesso negado.");

    document.getElementById("brandInput").value = config.brand;
    document.getElementById("logoAlignInput").value = config.logoAlign;
    document.getElementById("whatsInput").value = config.whats;
    document.getElementById("colorInput").value = config.color;

    document.getElementById("panel").classList.add("active");
}

// Inicializa a escuta assíncrona
carregarDadosDoServidor();
</script>
