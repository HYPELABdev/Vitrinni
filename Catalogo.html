<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>VITRINNI PRO - Commerce Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   RESET & VARIABLES
   ========================================================================== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased;}

:root{
  --primary:#ff003c;
  --primary-glow:rgba(255,0,60,0.15);
  --bg:#09090b;
  --surface:#18181b;
  --surface-hover:#27272a;
  --border:#27272a;
  --border-hover:#3f3f46;
  --text:#ffffff;
  --muted:#a1a1aa;
  --green:#10b981;
  --font-display:'Bebas Neue',sans-serif;
  --radius-sm:8px;
  --radius-md:16px;
  --radius-lg:24px;
  --transition:0.3s ease;
}

body{
  background-color:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;
  background-size:cover;background-position:center;background-attachment:fixed;
}

/* ==========================================================================
   HEADER & NAVIGATION
   ========================================================================== */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px;background:rgba(9, 9, 11, 0.85);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);
}

.header-left-actions { display: flex; align-items: center; }
.btn-sutil-admin{
  background:transparent;border:1px solid transparent;color:var(--muted);
  font-size:18px;cursor:pointer;padding:8px;border-radius:var(--radius-sm);
  transition:var(--transition);display:flex;align-items:center;justify-content:center;
}
.btn-sutil-admin:hover{color:var(--text);background:var(--surface);border-color:var(--border);}

#brandContainer{display:flex;flex-direction:row;align-items:center;gap:12px; flex: 1; justify-content: center;}
#brandLogo{
  height:40px;width:40px;object-fit:cover;border-radius:50%;
  border:1px solid var(--border);display:none;
}
.meta-store-info{display:flex;flex-direction:column;align-items:flex-start;}
#brandName {
  font-weight:800;font-size:20px;letter-spacing:-0.5px;line-height:1;
  color:var(--text);transition: var(--transition);
}
#brandBio{font-size:11px;color:var(--muted);font-weight:500;display:none;}

.btn-cart-premium{
  position:relative;background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-size:18px;cursor:pointer;padding:10px 14px;
  border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;
  transition:var(--transition);
}
.btn-cart-premium:hover{background:var(--surface-hover);border-color:var(--primary);}
#cartBadge{
  position:absolute;top:-6px;right:-6px;background:var(--primary);color:#fff;
  font-size:11px;font-weight:800;width:20px;height:20px;border-radius:50%;
  display:none;align-items:center;justify-content:center;
}

/* ==========================================================================
   BADGES & BANNERS
   ========================================================================== */
.badges-delivery-row{max-width:1200px;margin:16px auto 0;padding:0 24px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.info-badge{
  background:var(--surface);border:1px solid var(--border);padding:6px 12px;
  border-radius:var(--radius-sm);font-size:12px;font-weight:600;display:none;align-items:center;gap:6px;color:var(--text);
}

.banner-section{max-width:1200px;margin:24px auto 0;padding:0 24px;display:none;}
.banner-wrapper{display:flex;gap:16px;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;border-radius:var(--radius-lg);}
.banner-wrapper::-webkit-scrollbar{display:none;}
.banner-item{min-width:100%;scroll-snap-align:start;border-radius:var(--radius-lg);overflow:hidden;background:var(--surface);aspect-ratio: 21/9;}
.banner-item img{width:100%;height:100%;object-fit:cover;}

/* ==========================================================================
   SEARCH & FILTERS
   ========================================================================== */
.search-container{max-width:1200px;margin:24px auto;padding:0 24px;display:flex;flex-direction:column;gap:16px;}
.search-input-wrapper { position: relative; width: 100%; }
#searchInput{
  width:100%;padding:14px 16px 14px 44px;border-radius:var(--radius-md);
  border:1px solid var(--border);background:var(--surface);color:var(--text);
  font-size:15px;outline:none;transition:var(--transition);
}
#searchInput:focus{border-color:var(--primary);background:var(--bg);}
.search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--muted); pointer-events: none;}

.filter-tabs{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:8px;}
.filter-tabs::-webkit-scrollbar{display:none;}
.filter-tab{
  padding:8px 16px;border-radius:var(--radius-md);border:1px solid var(--border);
  background:var(--bg);color:var(--muted);font-size:13px;font-weight:600;
  cursor:pointer;white-space:nowrap;transition:var(--transition);
}
.filter-tab.active{background:var(--text);color:var(--bg);border-color:var(--text);}

/* ==========================================================================
   CATALOG LAYOUTS
   ========================================================================== */
.catalog{max-width:1200px;margin:0 auto;padding:0 24px 48px;position:relative;z-index:1;}

.catalog.mode-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:24px;}
.catalog.mode-carousel{
  display:flex !important;flex-wrap:nowrap !important;overflow-x:auto !important;
  gap:20px !important;scroll-snap-type:x mandatory;padding-bottom:24px;scrollbar-width:none;
}
.catalog.mode-carousel .card{flex:0 0 260px !important;scroll-snap-align:start;}
.catalog.mode-list{display:flex;flex-direction:column;gap:16px;}
.catalog.mode-list .card{flex-direction:row;height:120px;align-items:center;}
.catalog.mode-list .card-img-wrap{width:120px;height:100%;flex-shrink:0;border-bottom-width:0;border-right-width:1px;}
.catalog.mode-list .card-content{padding:16px;flex-direction:row;align-items:center;justify-content:space-between;width:100%;}
.catalog.mode-list .actions{margin-top:0;}

/* ==========================================================================
   PRODUCT CARDS
   ========================================================================== */
.card{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-md);
  overflow:hidden;transition:var(--transition);display:flex;flex-direction:column;cursor:pointer;
}
.card:hover{border-color:var(--border-hover);transform:translateY(-4px);box-shadow:0 12px 24px rgba(0,0,0,0.4);}
.card-img-wrap{position:relative;aspect-ratio:4/5;background:var(--surface);border-bottom:1px solid var(--border);overflow:hidden;}
.card img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s ease;}
.card:hover img{transform:scale(1.03);}

.card-content{padding:16px;display:flex;flex-direction:column;flex-grow:1;}
.card-category{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.card-name{font-weight:600;font-size:16px;margin-bottom:8px;line-height:1.3;color:var(--text);}
.card-desc{font-size:13px;color:var(--muted);margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.price{font-weight:800;font-size:20px;color:var(--text);margin-top:auto;}

.actions{margin-top:16px;}
.actions .cartBtn{
  width:100%;padding:12px;border:none;border-radius:var(--radius-sm);
  background:var(--surface);color:var(--text);cursor:pointer;
  font-weight:600;font-size:14px;transition:var(--transition);
}
.card:hover .cartBtn{background:var(--primary);color:#fff;}

/* ==========================================================================
   PRODUCT MODAL (BOTTOM SHEET ON MOBILE)
   ========================================================================== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);
  z-index:1000;display:none;align-items:center;justify-content:center;padding:24px;
  animation:fadeIn 0.2s ease;
}
.modal-card{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);
  width:100%;max-width:800px;display:grid;grid-template-columns:1fr 1fr;
  overflow:hidden;box-shadow:0 24px 48px rgba(0,0,0,0.5);animation:slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
}

.modal-img-container{width:100%;height:100%;background:var(--surface);min-height:400px;}
.modal-img-container img{width:100%;height:100%;object-fit:cover;}

.modal-info-pane{padding:32px;display:flex;flex-direction:column;position:relative;background:var(--bg);}
.modal-close-btn{
  position:absolute;top:16px;right:16px;background:var(--surface);border:1px solid var(--border);
  color:var(--text);width:32px;height:32px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:var(--transition);z-index:10;
}
.modal-close-btn:hover{background:var(--border-hover);}

/* Variants */
.variant-section{margin-top:24px;}
.variant-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:12px;}
.variant-container{display:flex;flex-wrap:wrap;gap:10px;}

.color-pill{
  width:32px;height:32px;border-radius:50%;border:2px solid transparent;
  cursor:pointer;transition:var(--transition);box-shadow: 0 0 0 1px var(--border);
}
.color-pill.selected{box-shadow: 0 0 0 2px var(--primary); transform:scale(1.1);}
.size-pill{
  padding:8px 16px;border:1px solid var(--border);background:var(--surface);
  font-size:14px;font-weight:600;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);
}
.size-pill.selected{background:var(--text);color:var(--bg);border-color:var(--text);}

.btn-add-cart {
  width:100%;margin-top:auto;padding:16px;background:var(--primary);color:#fff;
  border:none;border-radius:var(--radius-sm);font-weight:700;font-size:15px;
  cursor:pointer;transition:var(--transition);margin-top:32px;
}
.btn-add-cart:hover { opacity: 0.9; transform: translateY(-2px); }

/* ==========================================================================
   CART PANEL (SIDE DRAWER)
   ========================================================================== */
.cart-panel{
  position:fixed;top:0;right:-400px;width:100%;max-width:400px;height:100vh;
  background:var(--bg);border-left:1px solid var(--border);z-index:1100;
  display:flex;flex-direction:column;transition:right 0.3s cubic-bezier(0.16,1,0.3,1);
  box-shadow:-10px 0 30px rgba(0,0,0,0.5);
}
.cart-panel.open{right:0;}
.cart-header{display:flex;justify-content:space-between;align-items:center;padding:24px;border-bottom:1px solid var(--border);}
.cart-title{font-weight:700;font-size:20px;}
.cart-close{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;}
.cart-items{flex:1;overflow-y:auto;padding:24px;}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding-bottom:16px;margin-bottom:16px;border-bottom:1px solid var(--border);}
.cart-remove{background:none;border:none;color:var(--muted);cursor:pointer;text-decoration:underline;font-size:12px;margin-top:4px;}
.cart-footer{padding:24px;border-top:1px solid var(--border);background:var(--surface);}
.cart-total{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.cart-total-value{font-weight:800;font-size:24px;color:var(--text);}
.btn-checkout {
  width:100%;padding:16px;background:#25D366;color:#fff;border:none;
  border-radius:var(--radius-sm);font-weight:700;font-size:15px;cursor:pointer;
}

/* ==========================================================================
   ADMIN PANEL
   ========================================================================== */
.panel{
  position:fixed;right:-450px;top:0;width:100%;max-width:450px;height:100vh;
  background:var(--bg);z-index:1200;border-left:1px solid var(--border);
  display:flex;flex-direction:column;transition:right 0.3s ease;
}
.panel.active{right:0;}
.panel-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.panel-title{font-weight:700;font-size:18px;}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);}
.panel-tab{
  flex:1;padding:16px;background:none;border:none;border-bottom:2px solid transparent;
  color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition);
}
.panel-tab.active{color:var(--primary);border-bottom-color:var(--primary);}

.panel-body{flex:1;overflow-y:auto;padding:24px;padding-bottom:100px;}
.tab-content{display:none;}
.tab-content.active{display:block;}

.field{margin-bottom:20px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;}
.field input[type="text"],.field textarea,.field select{
  width:100%;padding:12px;border:1px solid var(--border);background:var(--surface);
  color:var(--text);border-radius:var(--radius-sm);font-size:14px;outline:none;
}
.field input:focus, .field textarea:focus { border-color:var(--primary); }

.panel-footer-sticky{
  position:absolute;bottom:0;left:0;right:0;padding:20px 24px;
  background:var(--bg);border-top:1px solid var(--border);
}
.panel-save-btn{
  width:100%;background:var(--text);color:var(--bg);border:none;padding:16px;
  font-weight:700;font-size:14px;border-radius:var(--radius-sm);cursor:pointer;
}

/* ==========================================================================
   UTILITIES & ANIMATIONS
   ========================================================================== */
#loadingStatus{text-align:center;padding:100px 20px;font-size:14px;color:var(--muted);}
#noResults{text-align:center;padding:60px 20px;color:var(--muted);display:none;}

@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* Toast */
.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 24px;font-size:14px;font-weight:600;}

/* AUTH SYSTEM MODAL */
.auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px;}
.auth-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:380px;padding:32px;text-align:center;}
.auth-field input{width:100%;background:var(--surface);border:1px solid var(--border);padding:16px;border-radius:var(--radius-sm);color:#fff;text-align:center;margin: 24px 0;}
.auth-buttons {display:flex;gap:12px;}
.auth-buttons button {flex:1; padding: 12px; border-radius: var(--radius-sm); border: none; font-weight: 600; cursor: pointer;}
.auth-buttons .primary { background: var(--primary); color: #fff;}

/* ==========================================================================
   RESPONSIVE (MOBILE FIRST ADAPTATIONS)
   ========================================================================== */
@media(max-width:768px){
  header { padding: 16px; }
  .modal-card { 
    grid-template-columns: 1fr; 
    border-radius: 24px 24px 0 0; 
    margin-top: auto; 
    max-height: 90vh; 
    overflow-y: auto; 
  }
  .modal-overlay { padding: 0; align-items: flex-end; }
  .modal-img-container { min-height: 300px; }
  .modal-info-pane { padding: 24px; }
  .banner-item { aspect-ratio: 16/9; }
  .catalog.mode-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .card-img-wrap { aspect-ratio: 1/1; }
  .card-content { padding: 12px; }
  .price { font-size: 16px; }
  .actions .cartBtn { padding: 8px; font-size: 13px; }
}
</style>
</head>
<body>

<header>
  <div class="header-left-actions">
    <button class="btn-sutil-admin" onclick="triggerAuthModal()" title="Configurações">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
  </div>
  <div id="brandContainer">
    <img id="brandLogo" src="" alt="Logo">
    <div class="meta-store-info">
      <h3 id="brandName">CARREGANDO...</h3>
      <span id="brandBio"></span>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn-cart-premium" id="cartToggleBtn" onclick="toggleCart()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
      <span id="cartBadge">0</span>
    </button>
  </div>
</header>

<div class="badges-delivery-row">
  <div class="info-badge" id="badgeDelivery">📦 <span id="badgeDeliveryText"></span></div>
  <div class="info-badge" id="badgeInsta">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.051.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
    <span id="badgeInstaText"></span>
  </div>
</div>

<div class="banner-section" id="bannerSection">
  <div class="banner-wrapper" id="bannerWrapper"></div>
</div>

<div class="search-container">
  <div class="search-input-wrapper">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar produtos..." oninput="filterProducts()">
  </div>
  <div class="filter-tabs" id="filterTabs"></div>
</div>

<div id="loadingStatus">Sincronizando catálogo...</div>
<div class="catalog mode-grid" id="catalog" style="display:none;"></div>
<div id="noResults">Nenhum produto encontrado.</div>

<div class="modal-overlay" id="productModal" onclick="closeProductModal(event)">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-img-container">
      <img id="modalImg" src="" alt="Produto">
    </div>
    <div class="modal-info-pane">
      <button class="modal-close-btn" onclick="closeProductModal(null)">✕</button>
      <div class="card-category" id="modalCategory">-</div>
      <h2 id="modalName" style="font-size:24px; font-weight:700; margin-bottom:12px; color:var(--text);">-</h2>
      <div class="price" id="modalPrice" style="font-size:28px; margin-bottom:16px;">R$ 0,00</div>
      <p id="modalDesc" style="font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:24px;">-</p>
      
      <div class="variant-section" id="modalColorsSection">
        <div class="variant-title">Cores Disponíveis</div>
        <div class="variant-container" id="modalColors"></div>
      </div>

      <div class="variant-section" id="modalSizesSection">
        <div class="variant-title">Tamanhos</div>
        <div class="variant-container" id="modalSizes"></div>
      </div>

      <button class="btn-add-cart" onclick="addSelectedToCart()">Adicionar à Sacola</button>
    </div>
  </div>
</div>

<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <span class="cart-title">Sua Sacola</span>
    <button class="cart-close" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span style="font-size:14px;color:var(--muted);font-weight:600;">Total</span>
      <span class="cart-total-value" id="total">R$ 0,00</span>
    </div>
    <button class="btn-checkout" onclick="checkout()">Finalizar no WhatsApp</button>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<div class="auth-overlay" id="authModal">
  <div class="auth-box">
    <h3 style="font-size: 20px; font-weight: 700; margin-bottom: 8px;">Acesso Restrito</h3>
    <p style="font-size: 13px; color: var(--muted);">Insira sua credencial administrativa.</p>
    <div class="auth-field">
      <input type="password" id="authKeyInput" placeholder="••••••••" onkeydown="if(event.key==='Enter') verifyAuthentication()">
    </div>
    <div class="auth-buttons">
      <button style="background: var(--surface); color: var(--text);" onclick="closeAuthModal()">Cancelar</button>
      <button class="primary" onclick="verifyAuthentication()">Acessar Painel</button>
    </div>
  </div>
</div>

<div class="panel" id="panel">
  <div class="panel-header">
    <span class="panel-title">Painel de Controle</span>
    <button onclick="closeEditor()" style="background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;">✕</button>
  </div>
  <div class="panel-tabs">
    <button class="panel-tab active" id="tabBtn-identidade" onclick="switchTab('identidade')">Loja</button>
    <button class="panel-tab" id="tabBtn-produtos" onclick="switchTab('produtos')">Estoque</button>
    <button class="panel-tab" id="tabBtn-visual" onclick="switchTab('visual')">Aparência</button>
  </div>

  <div class="panel-body">
    <div class="tab-content active" id="tab-identidade">
      <div class="field"><label>Nome da Loja</label><input id="brandInput" type="text"></div>
      <div class="field"><label>Bio / Slogan</label><input id="bioInput" type="text"></div>
      <div class="field"><label>WhatsApp Oficial (Com DDI/DDD)</label><input id="whatsInput" type="text"></div>
      <div class="field"><label>Instagram</label><input id="instaInput" type="text"></div>
      <div class="field"><label>Aviso de Entrega</label><input id="deliveryInput" type="text"></div>
      <div class="field">
        <label>URL da Logo</label>
        <input id="logoUrlInput" type="text" placeholder="https://..." oninput="handleUrlInput(this.value, 'logo')">
        <img id="logoPreview" style="display:none; max-height:40px; margin-top:8px; border-radius:8px;">
        <input type="file" accept="image/*" onchange="conversorImagem(this, 'logo')" style="margin-top:8px; font-size:12px;">
      </div>
    </div>

    <div class="tab-content" id="tab-produtos">
      <div class="field"><label>Nome do Produto</label><input id="pName" type="text"></div>
      <div class="field"><label>Preço</label><input id="pPrice" type="text"></div>
      <div class="field"><label>Categoria</label><input id="pCategory" type="text"></div>
      <div class="field"><label>Tamanhos (separados por vírgula)</label><input id="pSizes" type="text"></div>
      <div class="field"><label>Cores (Hex ou nome, separados por vírgula)</label><input id="pColors" type="text"></div>
      <div class="field">
        <label>URL da Imagem</label>
        <input id="pImgUrlInput" type="text" oninput="handleUrlInput(this.value, 'product')">
        <img id="productPreview" style="display:none; max-height:80px; margin-top:8px; border-radius:8px;">
        <input type="file" id="pImgInput" accept="image/*" onchange="conversorImagem(this, 'product')" style="margin-top:8px; font-size:12px;">
      </div>
      <div class="field"><label>Descrição</label><textarea id="pDesc" rows="3"></textarea></div>
      <button class="panel-save-btn" style="background:var(--primary);margin-bottom:24px;" onclick="addProduct()">Adicionar Produto</button>
      <div id="editorProductList" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>

    <div class="tab-content" id="tab-visual">
      <div class="field">
        <label>Layout do Catálogo</label>
        <select onchange="setThemeLayout(this.value)">
          <option value="grid">Grade (2 Colunas)</option>
          <option value="list">Lista</option>
          <option value="carousel">Carrossel Horizontal</option>
        </select>
      </div>
      <div class="field"><label>Cor Primária (Botões e Destaques)</label><input type="color" id="colorInput" style="width:100%; height:40px; border:none; background:none;" onchange="config.color=this.value;document.documentElement.style.setProperty('--primary', this.value); editorDirty=true;"></div>
      <div class="field">
        <label>Banners Promocionais (URL)</label>
        <div style="display:flex;gap:8px;">
          <input id="bannerUrlInput" type="text">
          <button onclick="addBannerUrl()" style="padding:0 16px; background:var(--surface); color:var(--text); border:1px solid var(--border); border-radius:var(--radius-sm); cursor:pointer;">Add</button>
        </div>
      </div>
      <div id="bannerManagerList" style="display:flex;flex-direction:column;gap:8px;margin-top:16px;"></div>
    </div>
  </div>

  <div class="panel-footer-sticky">
    <button class="panel-save-btn" id="btnMasterSave" onclick="saveConfig()">Salvar Alterações</button>
  </div>
</div>

<script>
// SCRIPT DE PROTEÇÃO ATIVA - ANTI-INSPEÇÃO & ANTI-DEBUGGER
(function protectiveShield() {
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    if (e.keyCode === 123 || 
        (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || 
        (e.ctrlKey && e.keyCode === 85)) {
      e.preventDefault();
      return false;
    }
  });
  setInterval(() => { (function() { return false; constructor('debugger')(); })(); }, 50);
})();

const urlParams = new URLSearchParams(window.location.search);
let nomeDaLoja = urlParams.get('loja');
if (!nomeDaLoja) {
  const pathParts = window.location.pathname.split('/');
  const lastPart = pathParts[pathParts.length - 1];
  if (lastPart && lastPart !== "" && !lastPart.includes('.html')) nomeDaLoja = lastPart;
}

let config = { brand:"STORE", bio:"", whats:"5511999999999", instagram:"", delivery:"", color:"#ff003c", bg:"", layout:"grid", logoAnim:"none", txtAnim:"none", banners:[] };
let products = [];
let cart = [];
let activeFilter = "todos";
let searchTerm = "";
let editorDirty = false;
let isDemoMode = false;
let currentModalProductIndex = null;
let selectedColor = null;
let selectedSize = null;
let tempLogoSource = "";
let tempProductSource = "";
let tempBgSource = "";

function toast(msg, type="info") {
  const el = document.createElement('div'); el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => { el.remove(); }, 3000);
}

function conversorImagem(input, destino) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
      let width = img.width; let height = img.height; const MAX_WIDTH = 800;
      if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
      canvas.width = width; canvas.height = height; ctx.drawImage(img, 0, 0, width, height);
      const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
      
      if (destino === 'logo') {
        tempLogoSource = compressedBase64; document.getElementById('logoPreview').src = compressedBase64;
        document.getElementById('logoPreview').style.display = 'block'; document.getElementById('logoUrlInput').value = "";
      } else if (destino === 'product') {
        tempProductSource = compressedBase64; document.getElementById('productPreview').src = compressedBase64;
        document.getElementById('productPreview').style.display = 'block'; document.getElementById('pImgUrlInput').value = "";
      } else if (destino === 'banner') {
        if(!config.banners) config.banners = [];
        config.banners.push(compressedBase64); render();
      }
      editorDirty = true;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function handleUrlInput(value, destino) {
  const val = value.trim();
  if (destino === 'logo') {
    tempLogoSource = val;
    if(val) { document.getElementById('logoPreview').src = val; document.getElementById('logoPreview').style.display = 'block'; } 
    else { document.getElementById('logoPreview').style.display = 'none'; }
  } else if (destino === 'product') {
    tempProductSource = val;
    if(val) { document.getElementById('productPreview').src = val; document.getElementById('productPreview').style.display = 'block'; } 
    else { document.getElementById('productPreview').style.display = 'none'; }
  }
  editorDirty = true;
}

function addBannerUrl() {
  const urlInput = document.getElementById('bannerUrlInput');
  const val = urlInput.value.trim();
  if(!val) return;
  if(!config.banners) config.banners = [];
  config.banners.push(val); urlInput.value = ""; render(); editorDirty = true;
}

function setThemeLayout(mode) { config.layout = mode; document.getElementById('catalog').className = `catalog mode-${mode}`; editorDirty = true; }

function openProductModal(idx) {
  const p = products[idx]; currentModalProductIndex = idx; selectedColor = null; selectedSize = null;
  document.getElementById('modalImg').src = p.img || 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500';
  document.getElementById('modalCategory').textContent = p.category || 'Geral';
  document.getElementById('modalName').textContent = p.name;
  document.getElementById('modalDesc').textContent = p.desc || '';
  document.getElementById('modalPrice').textContent = "R$ " + parseFloat(String(p.price).replace(',','.')).toFixed(2).replace('.',',');

  const colorsContainer = document.getElementById('modalColors');
  if (p.colors && p.colors.trim() !== "") {
    document.getElementById('modalColorsSection').style.display = "block";
    colorsContainer.innerHTML = p.colors.split(',').map(c => `<div class="color-pill" style="background:${c.trim()};" onclick="selectColor(this, '${c.trim()}')"></div>`).join('');
  } else { document.getElementById('modalColorsSection').style.display = "none"; }

  const sizesContainer = document.getElementById('modalSizes');
  if (p.sizes && p.sizes.trim() !== "") {
    document.getElementById('modalSizesSection').style.display = "block";
    sizesContainer.innerHTML = p.sizes.split(',').map(s => `<div class="size-pill" onclick="selectSize(this, '${s.trim()}')">${s.trim()}</div>`).join('');
  } else { document.getElementById('modalSizesSection').style.display = "none"; }

  document.getElementById('productModal').style.display = "flex";
}

function closeProductModal(e) { if(!e || e.target === document.getElementById('productModal')) { document.getElementById('productModal').style.display = "none"; } }

function selectColor(el, color) { document.querySelectorAll('.color-pill').forEach(p => p.classList.remove('selected')); el.classList.add('selected'); selectedColor = color; }
function selectSize(el, size) { document.querySelectorAll('.size-pill').forEach(p => p.classList.remove('selected')); el.classList.add('selected'); selectedSize = size; }

function addSelectedToCart() {
  const p = products[currentModalProductIndex];
  if (p.colors && p.colors.trim() !== "" && !selectedColor) { toast("Selecione uma Cor!"); return; }
  if (p.sizes && p.sizes.trim() !== "" && !selectedSize) { toast("Selecione um Tamanho!"); return; }
  cart.push({ ...p, chosenColor: selectedColor || null, chosenSize: selectedSize || null });
  renderCart(); document.getElementById('productModal').style.display = "none"; toast(`Adicionado à sacola!`);
}

function removeBanner(idx) { config.banners.splice(idx, 1); render(); editorDirty = true; }
function toggleCart() { document.getElementById('cartPanel').classList.toggle('open'); }
function removeCart(i) { cart.splice(i, 1); renderCart(); }

function renderCart() {
  const badge = document.getElementById('cartBadge');
  badge.textContent = cart.length; badge.style.display = cart.length > 0 ? 'flex' : 'none';
  const container = document.getElementById('cartItems');
  if (cart.length === 0) { container.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:14px;">Sacola vazia.</div>'; document.getElementById('total').textContent = "R$ 0,00"; return; }
  let total = 0;
  container.innerHTML = cart.map((c, i) => {
    const p = parseFloat(String(c.price).replace(',','.')); total += isNaN(p) ? 0 : p;
    const meta = `${c.chosenSize ? `Tam: ${c.chosenSize}` : ''} ${c.chosenColor ? `Cor: ${c.chosenColor}` : ''}`;
    return `
      <div class="cart-item">
        <div><div style="font-weight:600;">${c.name}</div><small style="color:var(--muted);">${meta}</small><div style="font-weight:700;margin-top:4px;">R$ ${p.toFixed(2).replace('.',',')}</div></div>
        <button class="cart-remove" onclick="removeCart(${i})">Remover</button>
      </div>`;
  }).join('');
  document.getElementById('total').textContent = "R$ " + total.toFixed(2).replace('.',',');
}

function checkout() {
  if (cart.length === 0) return;
  let msg = `🔥 *Novo Pedido - ${config.brand}*\n\n`; let total = 0;
  cart.forEach(c => {
    const p = parseFloat(String(c.price).replace(',','.'));
    const spec = `${c.chosenSize ? ` (Tam: ${c.chosenSize}` : ''}${c.chosenColor ? ` | Cor: ${c.chosenColor})` : c.chosenSize ? ')' : ''}`;
    msg += `▪️ 1x *${c.name}*${spec} - R$ ${p.toFixed(2).replace('.',',')}\n`; total += p;
  });
  msg += `\n🏁 *Total:* R$ ${total.toFixed(2).replace('.',',')}`;
  window.open(`https://wa.me/${config.whats}?text=${encodeURIComponent(msg)}`);
}

function filterProducts() { searchTerm = document.getElementById('searchInput').value.toLowerCase(); renderCatalog(); }
function setFilter(cat, el) { activeFilter = cat; document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active')); el.classList.add('active'); renderCatalog(); }

function buildFilterTabs() {
  const cats = ["Todos", ...new Set(products.map(p => p.category).filter(Boolean))];
  document.getElementById('filterTabs').innerHTML = cats.map(c => `<button class="filter-tab ${activeFilter===c.toLowerCase()?'active':''}" onclick="setFilter('${c.toLowerCase()}',this)">${c}</button>`).join('');
}

function renderCatalog() {
  const filtered = products.filter(p => {
    const matchCat = activeFilter === 'todos' || (p.category||'').toLowerCase() === activeFilter;
    const matchSearch = !searchTerm || p.name.toLowerCase().includes(searchTerm) || (p.desc||'').toLowerCase().includes(searchTerm);
    return matchCat && matchSearch;
  });
  document.getElementById('noResults').style.display = filtered.length === 0 ? 'block' : 'none';
  document.getElementById('catalog').innerHTML = filtered.map((p) => {
    const realIdx = products.indexOf(p);
    return `
      <div class="card" onclick="openProductModal(${realIdx})">
        <div class="card-img-wrap"><img src="${p.img || 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500'}"></div>
        <div class="card-content">
          <div class="card-category">${p.category || 'Geral'}</div>
          <div class="card-name">${p.name}</div>
          <div class="price">R$ ${parseFloat(String(p.price).replace(',','.')).toFixed(2).replace('.',',')}</div>
          <div class="actions"><button class="cartBtn" onclick="event.stopPropagation(); openProductModal(${realIdx})">Comprar</button></div>
        </div>
      </div>`;
  }).join('');
}

function render() {
  document.getElementById('brandName').textContent = (config.brand || "STORE").toUpperCase();
  const bioEl = document.getElementById('brandBio');
  if (config.bio) { bioEl.textContent = config.bio; bioEl.style.display = 'block'; } else { bioEl.style.display = 'none'; }
  
  const logo = document.getElementById('brandLogo');
  if (config.logo) { logo.src = config.logo; logo.style.display = 'block'; } else { logo.style.display = 'none'; }
  
  document.documentElement.style.setProperty('--primary', config.color || '#ff003c');
  
  const dBadge = document.getElementById('badgeDelivery');
  if(config.delivery) { document.getElementById('badgeDeliveryText').textContent = config.delivery; dBadge.style.display = 'inline-flex'; } else { dBadge.style.display = 'none'; }
  const iBadge = document.getElementById('badgeInsta');
  if(config.instagram) { document.getElementById('badgeInstaText').textContent = config.instagram; iBadge.style.display = 'inline-flex'; } else { iBadge.style.display = 'none'; }

  document.getElementById('catalog').className = `catalog mode-${config.layout || 'grid'}`;

  const sliderSec = document.getElementById('bannerSection');
  if(config.banners && config.banners.length > 0) {
    sliderSec.style.display = 'block';
    document.getElementById('bannerWrapper').innerHTML = config.banners.map(b => `<div class="banner-item"><img src="${b}"></div>`).join('');
    document.getElementById('bannerManagerList').innerHTML = config.banners.map((b, i) => `<div style="display:flex;align-items:center;gap:12px;"><img src="${b}" style="height:40px;border-radius:4px;"><button onclick="removeBanner(${i})" style="color:var(--primary);background:none;border:none;cursor:pointer;">Remover</button></div>`).join('');
  } else {
    sliderSec.style.display = 'none';
    document.getElementById('bannerManagerList').innerHTML = '<div style="font-size:12px;color:var(--muted);">Nenhum banner ativo.</div>';
  }

  buildFilterTabs(); renderCatalog(); renderEditorProductList();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('tabBtn-'+tab).classList.add('active');
}

function triggerAuthModal() { document.getElementById('authKeyInput').value = ""; document.getElementById('authModal').style.display = "flex"; document.getElementById('authKeyInput').focus(); }
function closeAuthModal() { document.getElementById('authModal').style.display = "none"; }

function verifyAuthentication() {
  const inputPass = document.getElementById('authKeyInput').value.trim().toUpperCase();
  if (inputPass === _0x9f3a(_0x4c1a)) { isDemoMode = false; closeAuthModal(); openEditor(); } 
  else if (inputPass === _0x9f3a(_0x2b8e)) { isDemoMode = true; closeAuthModal(); openEditor(); toast("Modo Demo Ativo."); } 
  else { toast("Credencial inválida."); }
}

function openEditor() {
  document.getElementById('brandInput').value = config.brand || "";
  document.getElementById('bioInput').value = config.bio || "";
  document.getElementById('whatsInput').value = config.whats || "";
  document.getElementById('instaInput').value = config.instagram || "";
  document.getElementById('deliveryInput').value = config.delivery || "";
  document.getElementById('colorInput').value = config.color || "#ff003c";
  editorDirty = false; document.getElementById('panel').classList.add('active');
}

function closeEditor() { if (editorDirty && !confirm("Descartar alterações?")) return; document.getElementById('panel').classList.remove('active'); }

function saveConfig() {
  config.brand = document.getElementById('brandInput').value.trim() || "STORE";
  config.bio = document.getElementById('bioInput').value.trim();
  config.whats = document.getElementById('whatsInput').value.trim();
  config.instagram = document.getElementById('instaInput').value.trim();
  config.delivery = document.getElementById('deliveryInput').value.trim();
  config.color = document.getElementById('colorInput').value;
  if(tempLogoSource) { config.logo = tempLogoSource; tempLogoSource = ""; }
  render(); editorDirty = false; document.getElementById('panel').classList.remove('active');
  if (!isDemoMode) salvarDadosNoServidor();
}

function addProduct() {
  const name = document.getElementById('pName').value.trim(); const price = document.getElementById('pPrice').value.trim();
  if (!name || !price) { toast("Preencha Nome e Preço!"); return; }
  products.push({
    name, price: price.replace(',','.'), category: document.getElementById('pCategory').value.trim() || "Geral",
    sizes: document.getElementById('pSizes').value.trim(), colors: document.getElementById('pColors').value.trim(),
    img: tempProductSource || document.getElementById('pImgUrlInput').value.trim(), desc: document.getElementById('pDesc').value.trim()
  });
  tempProductSource = ""; document.getElementById('productPreview').style.display = 'none';
  ['pName','pPrice','pCategory','pSizes','pColors','pDesc','pImgInput','pImgUrlInput'].forEach(id => document.getElementById(id).value = '');
  render(); if(!isDemoMode) salvarDadosNoServidor();
}

function deleteProduct(i) { if (!confirm(`Remover "${products[i].name}"?`)) return; products.splice(i, 1); render(); if(!isDemoMode) salvarDadosNoServidor(); }

function renderEditorProductList() {
  document.getElementById('editorProductList').innerHTML = products.length === 0 ? '<div style="color:var(--muted);font-size:12px;">Nenhum produto.</div>' : products.map((p, i) => `<div style="display:flex;justify-content:space-between;padding:12px;background:var(--surface);border-radius:8px;"><span>${p.name}</span><button onclick="deleteProduct(${i})" style="color:var(--primary);background:none;border:none;cursor:pointer;">Remover</button></div>`).join('');
}

async function carregarDadosDoServidor() {
  if (!nomeDaLoja) { document.getElementById("loadingStatus").innerHTML = "❌ Rota inválida (?loja=nome)"; return; }
  try {
    const response = await fetch(`/api/github?caminho=Clientes/CAT${nomeDaLoja}.json`, { method: "GET" });
    if (!response.ok) throw new Error("Inexistente");
    const dadosGit = await response.json(); window.shaAtual = dadosGit.sha;
    const conteudo = JSON.parse(decodeURIComponent(escape(atob(dadosGit.content))));
    config = { ...config, ...conteudo.config }; products = conteudo.products || [];
    if(!config.banners) config.banners = [];
    document.getElementById('loadingStatus').style.display = 'none'; document.getElementById('catalog').style.display = 'grid';
    render();
  } catch (erro) {
    document.getElementById('catalog').style.display = 'none';
    document.getElementById("loadingStatus").innerHTML = `<div style="padding:24px;"><h3 style="margin-bottom:12px;">Instância Pronta 🚀</h3><button onclick="triggerAuthModal()" style="padding:12px 24px; background:var(--primary); color:#fff; border:none; border-radius:8px;">Criar Ambiente</button></div>`;
  }
}

async function salvarDadosNoServidor() {
  if (!nomeDaLoja) return toast("Loja ausente.");
  const btn = document.getElementById('btnMasterSave'); if(btn) btn.disabled = true;
  const conteudoBase64 = btoa(unescape(encodeURIComponent(JSON.stringify({ config, products }, null, 2))));
  try {
    const response = await fetch(`/api/github?caminho=Clientes/CAT${nomeDaLoja}.json`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ metodo: "PUT", corpo: { message: `Build: ${nomeDaLoja}`, content: conteudoBase64, sha: window.shaAtual || undefined } })
    });
    if (!response.ok) throw new Error("Erro HTTP.");
    const resultado = await response.json(); window.shaAtual = resultado.content?.sha;
    toast("Salvo com sucesso!"); editorDirty = false;
  } catch (erro) { toast("Erro ao salvar: " + erro.message); } 
  finally { if(btn) btn.disabled = false; }
}

carregarDadosDoServidor();
</script>
