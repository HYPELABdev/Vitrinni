<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPELAB | UnderLux</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap');
        :root { --main: #bc9c6c; }
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .lux-text { font-family: 'Syncopate', sans-serif; }
        
        .tab-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .tab-btn.active { background: var(--main); color: #000; border-color: var(--main); box-shadow: 0 0 20px rgba(188, 156, 108, 0.3); }
        
        .card-premium { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s ease; }
        .card-premium:hover { border-color: var(--main); transform: translateY(-8px); }
        
        #cart-bar { background: rgba(10,10,10,0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--main); animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 p-5 flex justify-between items-center bg-black/60 backdrop-blur-lg">
        <div class="lux-text text-xl" id="brand-logo">HYPELAB<span>.</span></div>
        <div class="flex gap-6 text-[10px] font-bold">
            <span class="opacity-40 uppercase">📦 <span id="s-vendas">0</span> Pedidos</span>
            <span class="text-green-500">● <span id="s-online" class="text-white">0</span> Live</span>
        </div>
    </nav>

    <header class="pt-40 pb-16 px-6 text-center bg-[radial-gradient(circle_at_top,rgba(188,156,108,0.1)_0%,transparent_60%)]">
        <p class="text-[10px] tracking-[6px] uppercase opacity-40 mb-4" id="promo-text">Underground Luxury</p>
        <h1 class="lux-text text-5xl md:text-8xl mb-12" id="hero-title">DROPS</h1>
        <div id="tab-list" class="flex justify-start md:justify-center gap-3 overflow-x-auto pb-4 no-scrollbar px-6"></div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-48">
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div id="cart-bar" class="fixed bottom-0 left-0 w-full p-6 z-50 flex justify-between items-center hidden">
        <div>
            <p id="cart-count" class="text-[10px] uppercase font-black opacity-40">0 Itens</p>
            <p id="cart-total" class="text-2xl font-black text-[#bc9c6c]">R$ 0,00</p>
        </div>
        <button onclick="finishOrder()" class="bg-[#bc9c6c] text-black px-10 py-4 rounded-2xl font-black text-xs uppercase hover:scale-105 transition-all">
            Finalizar Compra
        </button>
    </div>

    <script>
        const URL_JSON = "https://hypelabdev.github.io/Vitrinni/Clientes/roupa.json";
        let DATA = {};
        let cart = [];

        async function init() {
            try {
                const res = await fetch(`${URL_JSON}?v=${Date.now()}`);
                DATA = await res.json();
                
                document.getElementById('brand-logo').innerHTML = `${DATA.brand}<span style="color:${DATA.color}">${DATA.brandHighlight}</span>`;
                document.getElementById('hero-title').innerText = DATA.hero;
                document.getElementById('promo-text').innerText = DATA.promo;
                document.getElementById('s-vendas').innerText = DATA.stats.sales;
                document.getElementById('s-online').innerText = DATA.stats.online;
                document.documentElement.style.setProperty('--main', DATA.color);

                renderTabs();
            } catch (e) { console.error("Erro ao iniciar:", e); }
        }

        function renderTabs() {
            const list = document.getElementById('tab-list');
            list.innerHTML = "";
            DATA.categories.forEach((cat, i) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn px-8 py-3 rounded-full text-[10px] font-black uppercase tracking-widest flex-shrink-0 ${i===0 ? 'active' : ''}`;
                btn.innerHTML = `${cat.icon} ${cat.name}`;
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderProducts(cat.plans);
                };
                list.appendChild(btn);
            });
            renderProducts(DATA.categories[0].plans);
        }

        function renderProducts(plans) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            plans.forEach(item => {
                const hasPromo = item.oldPrice && parseFloat(item.oldPrice) > parseFloat(item.price);
                grid.innerHTML += `
                    <div class="card-premium rounded-[2.5rem] p-5">
                        <div class="relative overflow-hidden rounded-[2rem] aspect-[3/4] mb-6 bg-white/5">
                            <img src="${item.foto}" class="w-full h-full object-cover">
                            ${hasPromo ? `<span class="absolute top-4 left-4 bg-red-600 text-[10px] font-black px-3 py-1 rounded-full">PROMO</span>` : ''}
                            ${item.badge ? `<span class="absolute top-4 right-4 bg-black/80 border border-white/10 text-[9px] font-bold px-3 py-1 rounded-full text-[#bc9c6c]">${item.badge}</span>` : ''}
                        </div>
                        <h3 class="lux-text text-[10px] opacity-40 mb-2">${item.name}</h3>
                        <p class="text-[12px] opacity-60 mb-6 h-10 overflow-hidden">${item.description || ''}</p>
                        <div class="flex justify-between items-end">
                            <div>
                                ${hasPromo ? `<p class="text-[11px] line-through opacity-20">R$ ${item.oldPrice}</p>` : ''}
                                <p class="text-3xl font-black">R$ ${item.price}</p>
                            </div>
                            <button onclick="addToCart('${item.name}', '${item.price}')" class="w-14 h-14 rounded-2xl bg-[#bc9c6c] text-black flex items-center justify-center hover:bg-white transition-all">
                                <i class="fa fa-plus text-lg"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(name, price) {
            const p = parseFloat(price.replace(',', '.'));
            cart.push({ name, price: p });
            
            const total = cart.reduce((acc, i) => acc + i.price, 0);
            document.getElementById('cart-bar').classList.remove('hidden');
            document.getElementById('cart-total').innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('cart-count').innerText = `${cart.length} Itens Selecionados`;
            
            // Efeito visual
            const btn = event.currentTarget;
            btn.innerHTML = '<i class="fa fa-check text-lg"></i>';
            setTimeout(() => btn.innerHTML = '<i class="fa fa-plus text-lg"></i>', 1000);
        }

        function finishOrder() {
            const total = cart.reduce((acc, i) => acc + i.price, 0);
            const msg = encodeURIComponent(`🛒 *NOVO PEDIDO*\n\n${cart.map(i => `• ${i.name}`).join('\n')}\n\n*TOTAL:* R$ ${total.toFixed(2)}`);
            window.open(`https://wa.me/${DATA.whatsapp}?text=${msg}`);
        }

        window.onload = init;
    </script>
</body>
</html>
