<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPELAB | UnderLux</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap');
        :root { --main: #bc9c6c; }
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .lux-text { font-family: 'Syncopate', sans-serif; }
        .tab-btn.active { background: var(--main); color: #000; border-color: var(--main); box-shadow: 0 0 15px rgba(188, 156, 108, 0.4); }
        .card-premium { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; position: relative; }
        .card-premium:hover { border-color: var(--main); transform: translateY(-5px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 p-5 flex justify-between items-center bg-black/80 backdrop-blur-md border-b border-white/5">
        <div class="lux-text text-xl tracking-tighter" id="brand-logo">HYPELAB<span>.</span></div>
        <div class="flex gap-4 text-[10px] font-bold opacity-60">
            <span>🔥 <span id="s-vendas">0</span> VENDAS</span>
            <span class="text-green-500">● <span id="s-online" class="text-white">0</span> ONLINE</span>
        </div>
    </nav>

    <header class="pt-40 pb-12 px-6 text-center">
        <p class="text-[10px] tracking-[8px] uppercase opacity-40 mb-4" id="promo-text">UNDERGROUND LUXURY</p>
        <h1 class="lux-text text-4xl md:text-6xl mb-10" id="hero-title">COLLECTION</h1>
        <div id="tab-list" class="flex justify-start md:justify-center gap-3 overflow-x-auto pb-6 no-scrollbar px-4"></div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-40">
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div id="cart-bar" class="fixed bottom-0 left-0 w-full bg-black/95 backdrop-blur-xl border-t border-[#bc9c6c] p-6 z-50 flex justify-between items-center hidden">
        <div>
            <p id="cart-count" class="text-[10px] uppercase opacity-50 font-black">0 ITENS</p>
            <p id="cart-total" class="text-2xl font-black text-[#bc9c6c]">R$ 0,00</p>
        </div>
        <button onclick="finishOrder()" class="bg-[#bc9c6c] text-black px-8 py-4 rounded-xl font-black text-xs uppercase hover:scale-105 transition-all">
            Finalizar Pedido
        </button>
    </div>

    <script>
        const URL_JSON = "https://hypelabdev.github.io/Vitrinni/Clientes/roupa.json";
        let DATA = {};
        let cart = [];

        async function init() {
            try {
                const res = await fetch(`${URL_JSON}?v=${Date.now()}`);
                DATA = await res.json();

                // Atualiza Textos Gerais
                document.getElementById('brand-logo').innerHTML = `${DATA.brand}<span style="color:${DATA.color}">${DATA.brandHighlight}</span>`;
                document.getElementById('hero-title').innerText = DATA.hero;
                document.getElementById('promo-text').innerText = DATA.promo || DATA.subtitle;
                document.getElementById('s-vendas').innerText = DATA.stats.sales;
                document.getElementById('s-online').innerText = DATA.stats.online;
                document.documentElement.style.setProperty('--main', DATA.color);

                renderTabs();
            } catch (e) {
                console.error("Erro:", e);
            }
        }

        function renderTabs() {
            const list = document.getElementById('tab-list');
            list.innerHTML = "";
            DATA.categories.forEach((cat, i) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn px-8 py-3 rounded-full border border-white/10 text-[10px] font-black uppercase transition-all flex-shrink-0 ${i===0 ? 'active' : ''}`;
                btn.innerHTML = `${cat.icon} ${cat.name}`;
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderProducts(cat.plans);
                };
                list.appendChild(btn);
            });
            renderProducts(DATA.categories[0].plans);
        }

        function renderProducts(plans) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            plans.forEach(item => {
                grid.innerHTML += `
                    <div class="card-premium rounded-[2.5rem] p-5">
                        <div class="relative overflow-hidden rounded-[2rem] mb-6 aspect-[3/4] bg-white/5">
                            <img src="${item.foto}" class="w-full h-full object-cover">
                            ${item.badge ? `<span class="absolute top-4 right-4 bg-black/80 text-[9px] font-bold px-3 py-1 rounded-full border border-white/10 text-[#bc9c6c]">${item.badge}</span>` : ''}
                        </div>
                        <h3 class="lux-text text-[10px] opacity-50 mb-2 tracking-widest">${item.name}</h3>
                        <p class="text-[11px] opacity-30 mb-4 h-8 overflow-hidden">${item.description || ''}</p>
                        <div class="flex justify-between items-center">
                            <p class="text-3xl font-black tracking-tighter">R$ ${item.price}</p>
                            <button onclick="addToCart('${item.name}', '${item.price}')" class="w-12 h-12 rounded-2xl bg-[#bc9c6c] text-black flex items-center justify-center hover:scale-110 transition-all">
                                <i class="fa fa-plus"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(name, priceRaw) {
            // Limpa o preço (tira R$, espaços e troca vírgula por ponto)
            let cleanPrice = priceRaw.replace('R$', '').replace(/\s/g, '').replace(',', '.');
            let price = parseFloat(cleanPrice);

            cart.push({ name, price });
            updateCartUI();

            // Efeito de feedback no botão
            event.currentTarget.innerHTML = '<i class="fa fa-check"></i>';
            setTimeout(() => { 
                renderProducts(document.querySelector('.tab-btn.active').innerText.split(' ')[1] === DATA.categories[0].name ? DATA.categories[0].plans : DATA.categories.find(c => btn.innerText.includes(c.name)).plans) 
                // Simplificando o refresh do ícone:
                init(); 
            }, 800);
        }

        function updateCartUI() {
            const total = cart.reduce((acc, i) => acc + i.price, 0);
            const bar = document.getElementById('cart-bar');
            bar.classList.remove('hidden');
            document.getElementById('cart-total').innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('cart-count').innerText = `${cart.length} ITENS SELECIONADOS`;
        }

        function finishOrder() {
            const total = cart.reduce((acc, i) => acc + i.price, 0);
            const itens = cart.map(i => `• ${i.name} (R$ ${i.price.toFixed(2)})`).join('%0A');
            const msg = `🛒 *NOVO PEDIDO - ${DATA.brand}*%0A%0A${itens}%0A%0A*TOTAL:* R$ ${total.toFixed(2)}%0A%0A_Favor enviar dados para PIX!_`;
            window.open(`https://wa.me/${DATA.whatsapp}?text=${msg}`);
        }

        window.onload = init;
    </script>
</body>
</html>
