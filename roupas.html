<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPELAB | UnderLux</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap');
        :root { --main: #bc9c6c; }
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .lux-text { font-family: 'Syncopate', sans-serif; }
        .tab-btn.active { background: var(--main); color: #000; border-color: var(--main); }
        .card-premium { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; }
        .card-premium:hover { border-color: var(--main); transform: translateY(-5px); }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 p-5 flex justify-between items-center bg-black/80 backdrop-blur-md border-b border-white/5">
        <div class="lux-text text-xl tracking-tighter" id="brand-logo">HYPELAB<span>.</span></div>
        <div class="flex gap-4 text-[10px] font-bold opacity-60">
            <span>🔥 <span id="s-vendas">0</span> VENDAS</span>
            <span class="text-green-500">● <span id="s-online" class="text-white">0</span> ONLINE</span>
        </div>
    </nav>

    <header class="pt-40 pb-16 px-6 text-center">
        <p class="text-[10px] tracking-[8px] uppercase opacity-40 mb-4" id="promo-text">LEVEL UP YOUR STYLE</p>
        <h1 class="lux-text text-5xl md:text-7xl mb-10" id="hero-title">COLLECTION</h1>
        <div id="tab-list" class="flex justify-center gap-2 overflow-x-auto pb-4 no-scrollbar"></div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-40">
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </main>

    <div id="cart-bar" class="fixed bottom-0 left-0 w-full bg-black/90 backdrop-blur-xl border-t border-[#bc9c6c] p-6 z-50 flex justify-between items-center hidden">
        <div>
            <p id="cart-count" class="text-[10px] uppercase opacity-50">0 ITENS</p>
            <p id="cart-total" class="text-2xl font-black text-[#bc9c6c]">R$ 0,00</p>
        </div>
        <button onclick="finishOrder()" class="bg-[#bc9c6c] text-black px-10 py-4 rounded-xl font-black text-xs uppercase">Finalizar WhatsApp</button>
    </div>

    <script>
        const URL_JSON = "https://hypelabdev.github.io/Vitrinni/Clientes/roupa.json";
        let DATA = {};
        let cart = [];

        async function init() {
            try {
                const res = await fetch(`${URL_JSON}?v=${Date.now()}`);
                const text = await res.text(); // Pega como texto primeiro para validar
                
                try {
                    DATA = JSON.parse(text);
                } catch(e) {
                    throw new Error("Erro de sintaxe no JSON (Verifique vírgulas ou aspas)");
                }

                if (!DATA.categories) throw new Error("A chave 'categories' não foi encontrada no JSON");

                // Preencher UI
                document.getElementById('hero-title').innerText = DATA.hero;
                document.getElementById('s-vendas').innerText = DATA.stats.sales;
                document.getElementById('s-online').innerText = DATA.stats.online;
                document.documentElement.style.setProperty('--main', DATA.color);

                renderTabs();
            } catch (e) {
                document.getElementById('product-grid').innerHTML = `<div class="col-span-full text-center py-20 text-red-500 font-bold">${e.message}</div>`;
            }
        }

        function renderTabs() {
            const list = document.getElementById('tab-list');
            DATA.categories.forEach((cat, i) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase transition ${i===0 ? 'active' : ''}`;
                btn.innerHTML = `${cat.icon} ${cat.name}`;
                btn.onclick = (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderProducts(cat.plans);
                };
                list.appendChild(btn);
            });
            renderProducts(DATA.categories[0].plans);
        }

        function renderProducts(plans) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            plans.forEach(item => {
                grid.innerHTML += `
                    <div class="card-premium rounded-[2rem] p-4">
                        <div class="relative overflow-hidden rounded-[1.5rem] mb-4 aspect-[3/4]">
                            <img src="${item.foto}" class="w-full h-full object-cover">
                            ${item.badge ? `<span class="absolute top-3 right-3 bg-black/80 text-[9px] font-black px-3 py-1 rounded-full border border-white/10 text-[#bc9c6c]">${item.badge}</span>` : ''}
                        </div>
                        <h3 class="lux-text text-[10px] opacity-60 mb-2">${item.name}</h3>
                        <div class="flex justify-between items-center">
                            <p class="text-2xl font-black">R$ ${item.price}</p>
                            <button onclick="addToCart('${item.name}', ${item.price})" class="w-10 h-10 rounded-full bg-[#bc9c6c] text-black flex items-center justify-center">
                                <i class="fa fa-plus"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(name, price) {
            cart.push({name, price});
            const total = cart.reduce((acc, i) => acc + i.price, 0);
            document.getElementById('cart-bar').classList.remove('hidden');
            document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('cart-count').innerText = `${cart.length} ITENS SELECIONADOS`;
        }

        function finishOrder() {
            const total = cart.reduce((acc, i) => acc + i.price, 0);
            const msg = encodeURIComponent(`🛒 *PEDIDO HYPELAB*\n\n${cart.map(i => `• ${i.name}`).join('\n')}\n\n*TOTAL:* R$ ${total.toFixed(2)}`);
            window.open(`https://wa.me/${DATA.whatsapp}?text=${msg}`);
        }

        window.onload = init;
    </script>
</body>
</html>
