<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UNIKA PRIVATE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--main:#ff003c;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

/* BG */

.bg{
position:fixed;
inset:0;
z-index:-1;

background:
radial-gradient(circle at top left,rgba(255,0,60,.12),transparent 35%),
linear-gradient(-45deg,#0a0a0a,#0f0f0f,#080808);

background-size:300% 300%;
animation:bg 10s ease infinite;
}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

/* HEADER */

header{
text-align:center;
padding:50px 20px 30px;
}

.logo{
font-size:64px;
font-weight:800;
letter-spacing:3px;
}

.logo .main{
color:white;
}

.logo .highlight{
color:var(--main);
text-shadow:0 0 20px rgba(255,0,60,.5);
}

.hero{
margin-top:14px;
font-size:26px;
font-weight:700;
}

.sub{
margin-top:8px;
color:#9ca6ba;
font-size:14px;
}

/* STATS */

.stats{
display:flex;
justify-content:center;
gap:12px;
margin-top:22px;
flex-wrap:wrap;
}

.stat{
padding:12px 15px;
border-radius:16px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
font-size:13px;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:20px;
padding-bottom:120px;
}

/* ALERT */

.alert{
padding:14px;
border-radius:18px;
margin-bottom:20px;

background:rgba(255,0,60,.08);
border:1px solid rgba(255,0,60,.18);
color:#ff9db2;
text-align:center;
}

/* CARDS */

.cards{
display:grid;
gap:18px;
}

.card{
position:relative;

padding:24px;

border-radius:26px;

background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));

border:1px solid rgba(255,255,255,.06);

transition:.25s;
cursor:pointer;
}

.card:hover{
transform:translateY(-4px);
}

.card.active{
border-color:var(--main);
box-shadow:0 0 30px rgba(255,0,60,.18);
transform:scale(1.02);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
}

.badge{
padding:6px 10px;
border-radius:12px;
background:rgba(255,255,255,.06);
font-size:11px;
}

.price{
margin-top:14px;
font-size:40px;
font-weight:800;
color:var(--main);
}

.desc{
margin-top:12px;
color:#aab4c7;
line-height:1.7;
font-size:14px;
}

/* FORM */

.form{
margin-top:24px;
padding:24px;
border-radius:24px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
}

.form-title{
font-size:17px;
font-weight:700;
}

input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:16px;
background:rgba(255,255,255,.05);
color:white;
margin-top:14px;
font-size:15px;
}

button{
width:100%;
padding:16px;
margin-top:16px;
border:none;
border-radius:18px;

background:linear-gradient(45deg,var(--main),#ff4d6d);

color:white;
font-size:15px;
font-weight:700;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:scale(1.02);
}

</style>

</head>

<body>

<div class="bg"></div>

<header>

<div class="logo">
<span class="main" id="brand1"></span>
<span class="highlight" id="brand2"></span>
</div>

<div class="hero" id="hero"></div>

<div class="sub" id="subtitle"></div>

<div class="stats">

<div class="stat">
🔥 <span id="sales"></span> vendas
</div>

<div class="stat">
🔴 <span id="online"></span> online
</div>

</div>

</header>

<div class="container">

<div class="alert" id="promo"></div>

<div class="cards" id="categories"></div>

<div class="form">

<div class="form-title">
Finalizar pedido
</div>

<input type="text" id="instagram" placeholder="@seuinstagram">

<button onclick="finishOrder()" id="cta">
🚀 Comprar agora
</button>

</div>

</div>

<script>

let CONFIG = {};
let selectedPlan = null;

/* 🔥 JSON LOCAL (GITHUB PASTA) */
fetch('./Clientes/unika.json')

.then(r => r.json())

.then(data => {

CONFIG = data;

/* THEME */
document.documentElement.style.setProperty('--main', CONFIG.color);

/* HEADER */
document.getElementById('brand1').innerHTML = CONFIG.brand;
document.getElementById('brand2').innerHTML = CONFIG.brandHighlight;

document.getElementById('hero').innerHTML = CONFIG.hero;
document.getElementById('subtitle').innerHTML = CONFIG.subtitle;
document.getElementById('promo').innerHTML = CONFIG.promo;

document.getElementById('sales').innerHTML = CONFIG.stats.sales;
document.getElementById('online').innerHTML = CONFIG.stats.online;

/* RENDER */
render();

})

.catch(err => {
document.body.innerHTML = `
<h2 style="color:white;padding:40px">
❌ Erro ao carregar unika.json
</h2>`;
console.log(err);
});

/* RENDER CATEGORIES */

function render(){

const box = document.getElementById('categories');
box.innerHTML = '';

CONFIG.categories.forEach(cat => {

let html = `
<h2 style="margin:20px 0">${cat.icon} ${cat.name}</h2>
`;

cat.plans.forEach((plan,i) => {

html += `
<div class="card ${i===0?'active':''}"
onclick="selectPlan(this, '${plan.name}', '${plan.price}')">

<div class="top">
<h3>${plan.name}</h3>
<div class="badge">${plan.badge}</div>
</div>

<div class="price">${plan.price}</div>

<div class="desc">${plan.description}</div>

</div>
`;

});

box.innerHTML += html;

});

/* default */
selectedPlan = CONFIG.categories[0].plans[0];
updateCTA();

}

/* SELECT */

function selectPlan(el,name,price){

document.querySelectorAll('.card')
.forEach(c => c.classList.remove('active'));

el.classList.add('active');

selectedPlan = {name, price};

updateCTA();

}

function updateCTA(){
document.getElementById('cta').innerText =
`🚀 Comprar ${selectedPlan.name}`;
}

/* BUY */

function finishOrder(){

let insta =
document.getElementById('instagram').value.trim();

if(!insta){
alert("Digite seu Instagram");
return;
}

if(!insta.startsWith('@')){
insta = '@'+insta;
}

const msg =
`🚀 PEDIDO UNIKA%0A%0A`+
`📦 Produto: ${selectedPlan.name}%0A`+
`💰 Valor: ${selectedPlan.price}%0A`+
`📸 Insta: ${insta}`;

window.open(
`https://wa.me/${CONFIG.whatsapp}?text=${msg}`,
'_blank'
);

}

</script>

</body>
</html>
