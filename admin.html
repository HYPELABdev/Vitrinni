<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HypeAI | Lead Miner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .scanning { animation: pulse-green 2s infinite; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 font-mono">

    <div class="max-w-5xl mx-auto p-6">
        <header class="border-b border-zinc-800 pb-4 mb-8">
            <h1 class="text-2xl font-bold text-green-500">HYPE_AI <span class="text-xs text-zinc-500 font-normal">v1.0.42</span></h1>
            <p class="text-zinc-500 text-sm italic">Status: System Online // Waiting for input...</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Painel de Controle -->
            <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-lg">
                <h3 class="text-zinc-400 mb-4 uppercase text-xs font-bold tracking-widest">Parâmetros de Busca</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-zinc-600 mb-1">NICHO / EMPRESA</label>
                        <input id="nicho" type="text" placeholder="ex: Cosméticos" class="w-full bg-black border border-zinc-700 p-2 rounded text-green-400 focus:outline-none focus:border-green-500">
                    </div>
                    <div>
                        <label class="block text-xs text-zinc-600 mb-1">LOCALIZAÇÃO</label>
                        <input id="local" type="text" placeholder="ex: São Paulo" class="w-full bg-black border border-zinc-700 p-2 rounded text-green-400 focus:outline-none focus:border-green-500">
                    </div>
                    <button onclick="startMining()" id="btnStart" class="w-full bg-green-600 hover:bg-green-700 text-black font-bold py-3 rounded transition-all">
                        INICIAR VARREDURA
                    </button>
                </div>
            </div>

            <!-- Terminal de Logs -->
            <div class="md:col-span-2 bg-black border border-zinc-800 p-4 rounded-lg h-64 overflow-y-auto text-xs" id="terminal">
                <p class="text-zinc-600 font-bold">[SYSTEM READY]</p>
            </div>
        </div>

        <!-- Tabela de Resultados -->
        <div class="mt-8 bg-zinc-900 border border-zinc-800 rounded-lg overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-zinc-800 text-zinc-400 uppercase text-xs">
                    <tr>
                        <th class="p-3">Fonte Encontrada</th>
                        <th class="p-3">E-mail Detectado</th>
                    </tr>
                </thead>
                <tbody id="resultsTable">
                    <!-- JS vai injetar aqui -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="hypeai.js"></script>
</body>
</html>
