<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EDITOR HYPELAB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #eee; font-family: 'Inter', sans-serif; }
        .node { margin-left: 20px; border-left: 1px solid #222; padding-left: 10px; }
        .key { color: #bc9c6c; font-weight: bold; font-size: 13px; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 3px 8px; border-radius: 4px; margin: 2px 0; outline: none; width: 300px; }
        input:focus { border-color: #bc9c6c; }
        .preview-img { width: 60px; height: 60px; object-fit: cover; border: 1px solid #bc9c6c; border-radius: 8px; margin-left: 10px; display: inline-block; vertical-align: middle; background: #000; }
    </style>
</head>
<body class="p-10">

    <div class="flex justify-between mb-8 border-b border-white/10 pb-4">
        <h1 class="text-xl font-black uppercase">Hypelab <span style="color:#bc9c6c">Editor</span></h1>
        <div>
            <input type="file" id="file" class="hidden" onchange="loadFile(event)">
            <button onclick="document.getElementById('file').click()" class="bg-white/5 border border-white/10 px-4 py-2 rounded text-xs uppercase font-bold mr-2">Abrir</button>
            <button onclick="saveFile()" class="bg-[#bc9c6c] text-black px-4 py-2 rounded text-xs uppercase font-bold">Salvar</button>
        </div>
    </div>

    <div id="editor"></div>

    <script>
        let data = {};

        // ESSA É A LÓGICA EXATA DA SUA BASE64
        function render(obj, container) {
            Object.entries(obj).forEach(([key, value]) => {
                const div = document.createElement('div');
                div.className = 'node';
                
                const label = document.createElement('span');
                label.className = 'key';
                label.innerText = key + ": ";
                div.appendChild(label);

                if (typeof value === 'object' && value !== null) {
                    div.appendChild(document.createTextNode(Array.isArray(value) ? '[' : '{'));
                    render(value, div);
                    const close = document.createElement('div');
                    close.innerText = Array.isArray(value) ? ']' : '}';
                    div.appendChild(close);
                } else {
                    const input = document.createElement('input');
                    input.value = value;
                    input.oninput = (e) => {
                        obj[key] = e.target.value;
                        // Injeção do Preview em tempo real
                        if (key === 'foto') {
                            const img = div.querySelector('img');
                            if(img) img.src = e.target.value;
                        }
                    };
                    div.appendChild(input);

                    // Lógica de Reconhecimento de Imagem
                    if (key === 'foto') {
                        const img = document.createElement('img');
                        img.className = 'preview-img';
                        img.src = value;
                        img.onerror = () => img.style.display = 'none';
                        img.onload = () => img.style.display = 'inline-block';
                        div.appendChild(img);
                    }
                }
                container.appendChild(div);
            });
        }

        function loadFile(e) {
            const reader = new FileReader();
            reader.onload = () => {
                data = JSON.parse(reader.result);
                const container = document.getElementById('editor');
                container.innerHTML = '';
                render(data, container);
            };
            reader.readAsText(e.target.files[0]);
        }

        function saveFile() {
            const blob = new Blob([JSON.stringify(data, null, 4)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'roupa.json';
            a.click();
        }
    </script>
</body>
</html>
