<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Edição | Level Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b1020] text-white p-6">

    <div class="max-w-xl mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-green-400">Editor de Vitrine</h1>
        
        <div id="form-edicao" class="bg-gray-900 p-6 rounded-2xl border border-gray-800 space-y-4">
            <!-- Campos serão gerados aqui -->
            <div id="inputs-dinamicos" class="space-y-4"></div>

            <button onclick="salvarAlteracoes()" id="btn-save" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-xl font-bold transition-all mt-6">
                SALVAR ALTERAÇÕES
            </button>
        </div>
        
        <p id="status" class="mt-4 text-center text-sm text-gray-500"></p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const arquivoJson = params.get('file'); // Pega o nome do arquivo no link ?file=config_joao.json
        const REPO = "hypelabdev/Vitrinni";
        const TOKEN = "SEU_TOKEN_AQUI"; // Coloque seu token aqui

        let currentData = {};
        let currentSha = "";

        // 1. CARREGAR DADOS DO JSON
        async function carregar() {
            if(!arquivoJson) return alert("Arquivo não especificado na URL!");
            
            document.getElementById('status').innerText = "Carregando dados...";
            
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${arquivoJson}`);
            const file = await res.json();
            
            currentSha = file.sha;
            currentData = JSON.parse(atob(file.content));

            renderizarInputs();
            document.getElementById('status').innerText = "Editando: " + arquivoJson;
        }

        // 2. CRIAR OS INPUTS NA TELA
        function renderizarInputs() {
            const container = document.getElementById('inputs-dinamicos');
            container.innerHTML = `
                <div>
                    <label class="block text-xs text-gray-400 mb-1">TÍTULO DA MARCA</label>
                    <input type="text" id="brand" value="${currentData.brand}" class="w-full bg-black p-3 rounded-lg border border-gray-700">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">DESTAQUE (COR)</label>
                    <input type="text" id="brandHighlight" value="${currentData.brandHighlight}" class="w-full bg-black p-3 rounded-lg border border-gray-700">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">COR PRINCIPAL (HEX)</label>
                    <input type="color" id="color" value="${currentData.color}" class="w-full h-12 bg-black p-1 rounded-lg border border-gray-700">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">WHATSAPP (COM DDD)</label>
                    <input type="text" id="whatsapp" value="${currentData.whatsapp}" class="w-full bg-black p-3 rounded-lg border border-gray-700">
                </div>
            `;
        }

        // 3. SALVAR NO GITHUB
        async function salvarAlteracoes() {
            const btn = document.getElementById('btn-save');
            btn.innerText = "SALVANDO...";
            btn.disabled = true;

            // Atualiza o objeto com o que foi digitado
            currentData.brand = document.getElementById('brand').value;
            currentData.brandHighlight = document.getElementById('brandHighlight').value;
            currentData.color = document.getElementById('color').value;
            currentData.whatsapp = document.getElementById('whatsapp').value;

            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${arquivoJson}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${TOKEN}` },
                body: JSON.stringify({
                    message: "Edição via Editor Universal",
                    content: btoa(JSON.stringify(currentData, null, 2)),
                    sha: currentSha
                })
            });

            if(res.ok) {
                alert("Sucesso! As alterações aparecerão em breve no site.");
                location.reload(); // Recarrega para pegar o novo SHA
            } else {
                alert("Erro ao salvar. Verifique o token.");
            }
        }

        carregar();
    </script>
</body>
</html>
