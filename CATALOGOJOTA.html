<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HYPELAB Catalog PRO MAX</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

:root{
--primary:#ff003c;
--bg:#050505;
--card:rgba(20,20,20,0.55);
--border:rgba(255,255,255,0.1);
--text:#fff;
}

body{
background:var(--bg);
color:var(--text);
overflow-x:hidden;
background-size: cover;
background-position: center;
background-attachment: fixed;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 20px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(15px);
position:sticky;
top:0;
z-index:10;
}

#brandContainer {
display: flex;
align-items: center;
gap: 10px;
}

#brandLogo {
height: 35px;
width: auto;
object-fit: contain;
display: none;
}

#brandName{
font-weight:800;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-3px);}
}

.btn{
padding:10px 12px;
border:none;
border-radius:10px;
cursor:pointer;
background:#222;
color:#fff;
}

.btn.primary{background:var(--primary);}

/* GRID */
.catalog{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:16px;
padding:20px;
}

.card{
background:var(--card);
backdrop-filter:blur(16px);
border:1px solid var(--border);
border-radius:16px;
overflow:hidden;
transition:.3s;
}

.card:hover{transform:scale(1.03);}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{padding:12px;}

.price{color:#00ff9d;font-weight:700;margin:6px 0;}

.actions{
display:flex;
gap:8px;
}

.buy{
flex:1;
padding:8px;
border:none;
border-radius:8px;
background:var(--primary);
color:#fff;
cursor:pointer;
}

.cartBtn{
flex:1;
padding:8px;
border:none;
border-radius:8px;
background:#111;
color:#fff;
cursor:pointer;
border:1px solid var(--border);
}

/* PANEL */
.panel{
position:fixed;
right:-420px;
top:0;
width:380px;
height:100vh;
background:rgba(10,10,10,0.95);
backdrop-filter:blur(20px);
padding:16px;
overflow-y:auto;
transition:.3s;
z-index:999;
border-left: 1px solid var(--border);
}

.panel.active{right:0;}

.section-title{
font-size:12px;
opacity:.6;
margin:12px 0;
font-weight: bold;
text-transform: uppercase;
letter-spacing: 1px;
}

/* CART */
.cart{
position:fixed;
bottom:20px;
right:20px;
width:300px;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(15px);
border:1px solid var(--border);
border-radius:14px;
padding:12px;
z-index:999;
}

.cart h4{margin-bottom:10px;}

.cart-item{
display:flex;
justify-content:space-between;
font-size:13px;
margin:6px 0;
}

.total{
margin-top:10px;
font-weight:800;
color:#00ff9d;
}

/* INPUTS */
input,textarea, select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid var(--border);
background:#111;
color:#fff;
}

input[type="color"] {
height: 40px;
padding: 2px;
cursor: pointer;
}

/* LISTA DE PRODUTOS NO EDITOR */
.editor-product-list {
margin-top: 10px;
max-height: 200px;
overflow-y: auto;
}
.editor-product-item {
display: flex;
justify-content: space-between;
align-items: center;
background: rgba(255,255,255,0.05);
padding: 8px;
margin: 4px 0;
border-radius: 6px;
font-size: 13px;
}
.delete-prod-btn {
background: #ff003c;
color: white;
border: none;
padding: 2px 8px;
border-radius: 4px;
cursor: pointer;
}
.close-panel-btn {
float: right;
background: none;
border: none;
color: #fff;
font-size: 20px;
cursor: pointer;
}
</style>
</head>

<body>

<header>
<div id="brandContainer">
<img id="brandLogo" src="" alt="Logo">
<h3 id="brandName">HYPELAB STORE</h3>
</div>
<div>
<button class="btn" onclick="openEditor()">Editor</button>
<button class="btn primary" onclick="checkout()">🛒 Comprar</button>
</div>
</header>

<div class="catalog" id="catalog"></div>

<!-- CART -->
<div class="cart">
<h4>Carrinho</h4>
<div id="cartItems"></div>
<div class="total" id="total">Total: R$ 0,00</div>
</div>

<!-- PANEL -->
<div class="panel" id="panel">
<button class="close-panel-btn" onclick="document.getElementById('panel').classList.remove('active')">×</button>
<h3>Editor de Catálogo</h3>

<div class="section-title">Textos e Identidade</div>
<label style="font-size:11px;">Nome da Marca:</label>
<input id="brandInput" placeholder="Marca">

<label style="font-size:11px;">Link ou URL do Logotipo:</label>
<input id="logoInput" placeholder="URL da Imagem do Logo">

<label style="font-size:11px;">WhatsApp (Apenas números com DDD):</label>
<input id="whatsInput" placeholder="Ex: 5511999999999">

<div class="section-title">Visual e Cores</div>
<label style="font-size:11px;">Cor Principal do Tema:</label>
<input type="color" id="colorInput">

<label style="font-size:11px;">URL da Foto de Fundo:</label>
<input id="bgInput" placeholder="URL da Imagem de Fundo">

<button class="btn primary" style="width:100%; margin-top:10px;" onclick="saveConfig()">Salvar Configurações</button>

<hr style="margin:20px 0; border-color:var(--border);">

<div class="section-title">Gerenciar Produtos</div>

<label style="font-size:11px;">Nome do Produto:</label>
<input id="pName" placeholder="Ex: Camiseta Hype">
<label style="font-size:11px;">Preço (Use ponto para centavos):</label>
<input id="pPrice" placeholder="Ex: 89.90">
<label style="font-size:11px;">URL da Foto do Produto:</label>
<input id="pImg" placeholder="URL da Imagem">
<label style="font-size:11px;">Descrição Breve:</label>
<textarea id="pDesc" placeholder="Detalhes do produto..."></textarea>

<button class="btn primary" style="width:100%; margin-bottom:15px;" onclick="addProduct()">Adicionar Produto</button>

<label style="font-size:11px; font-weight:bold;">Produtos Cadastrados:</label>
<div class="editor-product-list" id="editorProductList"></div>

</div>

<script>

const PASSWORD="KALLI420"

let config=JSON.parse(localStorage.getItem("config"))||{
brand:"HYPELAB",
logo:"",
whats:"5511999999999",
color:"#ff003c",
bg:""
}

let products=JSON.parse(localStorage.getItem("products"))||[]
let cart=JSON.parse(localStorage.getItem("cart"))||[]

function saveAll(){
localStorage.setItem("config",JSON.stringify(config))
localStorage.setItem("products",JSON.stringify(products))
localStorage.setItem("cart",JSON.stringify(cart))
}

/* RENDER */
function render(){
// Aplicar Textos e Logo
document.getElementById("brandName").innerText=config.brand
if(config.logo && config.logo.trim() !== "") {
document.getElementById("brandLogo").src = config.logo
document.getElementById("brandLogo").style.display = "block"
} else {
document.getElementById("brandLogo").style.display = "none"
}

// Aplicar Cores Visuais e Fundo
document.documentElement.style.setProperty('--primary',config.color)
document.body.style.backgroundImage=config.bg?`url(${config.bg})`:"none"

/* PRODUTOS NO CATÁLOGO */
document.getElementById("catalog").innerHTML=
products.map((p,i)=>`
<div class="card">
<img src="${p.img || 'https://via.placeholder.com/240x200?text=Sem+Foto'}">
<div class="card-content">
<h4>${p.name}</h4>
<p style="font-size:13px;color:#aaa">${p.desc}</p>
<div class="price">R$ ${parseFloat(p.price).toFixed(2).replace('.', ',')}</div>

<div class="actions">
<button class="cartBtn" onclick="addCart(${i})">Carrinho</button>
<button class="buy" onclick="buy('${p.name}','${p.price}')">Comprar</button>
</div>

</div>
</div>
`).join('')

renderCart()
renderEditorProductList()
}

/* CART */
function addCart(i){
cart.push(products[i])
saveAll()
renderCart()
}

function removeCart(i){
cart.splice(i,1)
saveAll()
renderCart()
}

function renderCart(){
let total=0

document.getElementById("cartItems").innerHTML=
cart.map((c,i)=>{
// Correção do NaN: Converte e limpa o formato caso venha com vírgula
let cleanPrice = String(c.price).replace(',', '.');
let parsedPrice = parseFloat(cleanPrice);
if(!isNaN(parsedPrice)){
total += parsedPrice;
}

return `
<div class="cart-item">
<span>${c.name}</span>
<span onclick="removeCart(${i})" style="cursor:pointer">❌</span>
</div>
`
}).join('')

document.getElementById("total").innerText="Total: R$ "+total.toFixed(2).replace('.', ',')
}

/* BUY DIRECT */
function buy(n,p){
let cleanPrice = parseFloat(String(p).replace(',', '.')).toFixed(2).replace('.', ',');
window.open(`https://wa.me/${config.whats}?text=${encodeURIComponent("Quero o produto: "+n+" - Valor: R$ "+cleanPrice)}`)
}

/* CHECKOUT CART */
function checkout(){
let msg="*Novo Pedido:*\n\n"
let total=0
cart.forEach(c=>{
let cleanPrice = parseFloat(String(c.price).replace(',', '.'));
msg+=`- ${c.name}: R$ ${cleanPrice.toFixed(2).replace('.', ',')}\n`
total += cleanPrice
})
msg+=`\n*Total:* R$ ${total.toFixed(2).replace('.', ',')}`
window.open(`https://wa.me/${config.whats}?text=${encodeURIComponent(msg)}`)
}

/* ADD PRODUCT */
function addProduct(){
if(!pName.value || !pPrice.value) return alert("Preencha o nome e preço do produto!");

// Forçar o preço a salvar usando ponto como separador decimal interno
let formattedPrice = pPrice.value.replace(',', '.');

products.push({
name:pName.value,
price:formattedPrice,
img:pImg.value,
desc:pDesc.value
})
saveAll()
render()

// Limpar inputs de cadastro
pName.value = ""
pPrice.value = ""
pImg.value = ""
pDesc.value = ""
}

/* DELETE PRODUCT FROM EDITOR */
function deleteProduct(i){
if(confirm("Tem certeza que deseja excluir este produto?")){
products.splice(i,1)
saveAll()
render()
}
}

/* LIST PRODUCTS IN PANEL */
function renderEditorProductList(){
document.getElementById("editorProductList").innerHTML = 
products.map((p,i)=>`
<div class="editor-product-item">
<span>${p.name}</span>
<button class="delete-prod-btn" onclick="deleteProduct(${i})">Excluir</button>
</div>
`).join('')
}

/* CONFIG */
function saveConfig(){
config.brand=brandInput.value
config.logo=logoInput.value
config.whats=whatsInput.value
config.color=colorInput.value
config.bg=bgInput.value
saveAll()
render()
document.getElementById("panel").classList.remove("active")
}

function openEditor(){
let pass=prompt("Senha")
if(pass!==PASSWORD)return alert("Negado")

// Preenche os inputs do painel com as configs atuais ao abrir
brandInput.value = config.brand
logoInput.value = config.logo || ""
whatsInput.value = config.whats
colorInput.value = config.color
bgInput.value = config.bg || ""

document.getElementById("panel").classList.add("active")
}

// Inicialização
render()

</script>

</body>
</html>
